<script>
  window.storage = {
    async get(key){ const v = localStorage.getItem(key); return v===null ? null : {key, value:v}; },
    async set(key,value){ try{ localStorage.setItem(key, value); return {key,value}; }catch(e){ return null; } },
    async delete(key){ localStorage.removeItem(key); return {key, deleted:true}; },
    async list(prefix=''){ const keys=[]; for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i); if(k.startsWith(prefix)) keys.push(k);} return {keys}; },
  };
</script>

  if (!s) return null;
  const t = s.trim();

// ---------- Main app ----------
function FieldLedger() {
  const [data, setData] = useState(null);
  const [tab, setTab] = useState("today");
  const [focusJob, setFocusJob] = useState(null);
  const openJob = (id) => { setFocusJob(id); setTab("jobs"); };
  const [storageOk, setStorageOk] = useState(true);

  // Load
  useEffect(() => {
    (async () => {
      let loaded = null;
      try {
        if (typeof window !== "undefined" && window.storage) {
          const res = await window.storage.get("field-ledger-v1");
          if (res && res.value) loaded = JSON.parse(res.value);
        }
      } catch (e) {
        // key missing or storage unavailable — start fresh
      }
      setData(loaded ? {
        ...loaded,
        schedule: loaded.schedule || [],
        tasks: loaded.tasks || [],
        crew: (loaded.crew || []).map((c) => ({ ...c, rate: c.rate || 75, casual: c.casual || false, active: c.active !== false })).sort(byName),
        jobs: (loaded.jobs || []).map((j) => ({ ...j, expenses: j.expenses || [], changes: j.changes || [], address: j.address || "" })).sort(byName),
      } : seed());
    })();
  }, []);

  // Save
  const save = async (next) => {
    setData(next);
    try {
      if (typeof window !== "undefined" && window.storage) {
        const r = await window.storage.set("field-ledger-v1", JSON.stringify(next));
        if (!r) setStorageOk(false);
      } else {
        setStorageOk(false);
      }
    } catch {
      setStorageOk(false);
    }
  };

  const [confirmReset, setConfirmReset] = useState(false);
  const [moreOpen, setMoreOpen] = useState(false);
  const resetAll = async () => {
    if (!confirmReset) {
      setConfirmReset(true);
      setTimeout(() => setConfirmReset(false), 3000);
      return;
    }
    setConfirmReset(false);
    const fresh = seed();
    fresh.crew = [...fresh.crew].sort(byName);
    fresh.jobs = [...fresh.jobs].sort(byName);
    try {
      if (typeof window !== "undefined" && window.storage) {
        await window.storage.set("field-ledger-v1", JSON.stringify(fresh));
      }
    } catch {}
    setData(fresh);
  };

  if (!data)
    return (
      <div style={{ minHeight: "100vh", background: T.bg, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: font.display, color: T.sub }}>
        Loading the books…
      </div>
    );

  const primaryTabs = [
    { id: "today", label: "Today" },
    { id: "schedule", label: "Schedule" },
    { id: "jobs", label: "Jobs" },
    { id: "hours", label: "Hours" },
  ];
  const overflowTabs = [
    { id: "calendar", label: "Calendar", desc: "Month view & calendar exports" },
    { id: "tasks", label: "Tasks", desc: "Assign and track work" },
    { id: "assistant", label: "Assistant", desc: "Ask Claude about your data" },
    { id: "manage", label: "Manage", desc: "Crew, jobs & overhead settings" },
  ];
  const inMore = overflowTabs.some((t) => t.id === tab);
  const go = (id) => { setTab(id); setMoreOpen(false); };
  const navBtn = (active) => ({
    background: "none", border: "none", cursor: "pointer",
    fontFamily: font.display, fontWeight: 700, fontSize: 12,
    letterSpacing: "0.01em", textTransform: "uppercase",
    color: active ? T.ink : T.sub,
    borderTop: active ? `3px solid ${T.hivis}` : "3px solid transparent",
    paddingTop: 6, flex: "1 1 0", minWidth: 44, whiteSpace: "nowrap",
  });

  return (
    <div style={{ minHeight: "100vh", background: T.bg, fontFamily: font.body, color: T.ink, paddingBottom: 86 }}>
      <style>{`
        * { -webkit-tap-highlight-color: transparent; }
        input, select { font-size: 16px !important; }
        @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
      `}</style>

      {/* Header */}
      <div style={{ background: T.ink, color: "#fff", padding: "18px 16px 14px" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", maxWidth: 560, margin: "0 auto" }}>
          <div>
            <div style={{ fontFamily: font.display, fontWeight: 800, fontSize: 22, letterSpacing: "0.03em" }}>
              FIELD<span style={{ color: T.hivis }}>LEDGER</span>
            </div>
            <div style={{ fontSize: 12, color: "#9FB0AC" }}>
              {new Date().toLocaleDateString("en-US", { weekday: "short", month: "long", day: "numeric" })}
              {data.seeded ? " · sample data" : ""}
            </div>
          </div>
          <Btn kind="ghost" small onClick={resetAll} style={{ color: confirmReset ? T.hivis : "#9FB0AC", borderColor: confirmReset ? T.hivis : "#3A4644" }}>
            {confirmReset ? "Tap again" : "Reset"}
          </Btn>
        </div>
      </div>

      {!storageOk && (
        <div style={{ background: T.hivisSoft, color: T.out, fontSize: 13, padding: "8px 16px", textAlign: "center" }}>
          Saving is unavailable right now — changes will last only this session.
        </div>
      )}

      <div style={{ maxWidth: 560, margin: "0 auto", padding: "14px 14px 0" }}>
        {tab === "today" && <Today data={data} onOpenJob={openJob} />}
        {tab === "schedule" && <Schedule data={data} save={save} />}
        {tab === "calendar" && <CalendarView data={data} />}
        {tab === "jobs" && <Jobs data={data} save={save} focusJob={focusJob} clearFocus={() => setFocusJob(null)} />}
        {tab === "tasks" && <TaskTracker data={data} save={save} />}
        {tab === "hours" && <HoursReport data={data} />}
        {tab === "assistant" && <Assistant data={data} />}
        {tab === "manage" && <Manage data={data} save={save} />}
      </div>

      {/* More sheet */}
      {moreOpen && (
        <>
          <div onClick={() => setMoreOpen(false)} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.35)", zIndex: 60 }} />
          <div style={{ position: "fixed", left: 0, right: 0, bottom: 0, background: T.card, borderTopLeftRadius: 18, borderTopRightRadius: 18, zIndex: 61, padding: "10px 14px calc(16px + env(safe-area-inset-bottom))", maxWidth: 560, margin: "0 auto" }}>
            <div style={{ width: 40, height: 4, borderRadius: 2, background: T.line, margin: "6px auto 12px" }} />
            <div style={{ fontFamily: font.display, fontWeight: 800, fontSize: 12, letterSpacing: ".08em", textTransform: "uppercase", color: T.sub, marginBottom: 8, paddingLeft: 2 }}>More</div>
            {overflowTabs.map((t) => (
              <button key={t.id} onClick={() => go(t.id)} style={{ display: "flex", flexDirection: "column", alignItems: "flex-start", width: "100%", textAlign: "left", background: tab === t.id ? T.hivisSoft : "transparent", border: "none", borderRadius: 12, padding: "12px", cursor: "pointer", marginBottom: 4 }}>
                <span style={{ fontFamily: font.display, fontWeight: 700, fontSize: 16, color: tab === t.id ? T.hivis : T.ink }}>{t.label}</span>
                <span style={{ fontSize: 12, color: T.sub, marginTop: 2 }}>{t.desc}</span>
              </button>
            ))}
          </div>
        </>
      )}

      {/* Bottom nav */}
      <nav
        style={{
          position: "fixed", bottom: 0, left: 0, right: 0,
          background: T.card, borderTop: `1px solid ${T.line}`,
          display: "flex", justifyContent: "space-around",
          padding: "8px 6px calc(8px + env(safe-area-inset-bottom))", zIndex: 50,
        }}
      >
        {primaryTabs.map((t) => (
          <button key={t.id} onClick={() => go(t.id)} style={navBtn(tab === t.id)}>{t.label}</button>
        ))}
        <button onClick={() => setMoreOpen((v) => !v)} style={navBtn(inMore || moreOpen)}>More ⋯</button>
      </nav>
    </div>
  );
}

// ---------- Shared math ----------
function useTotals(data) {
  return useMemo(() => {
    const m = monthStr();
    const laborByJob = {};
    let laborTotal = 0;
    data.timeEntries.forEach((e) => {
      const guy = data.crew.find((c) => c.id === e.crewId);
      if (!guy) return;
      const cost = e.hours * guy.rate;
      laborByJob[e.jobId] = (laborByJob[e.jobId] || 0) + cost;
      if (e.date.startsWith(m)) laborTotal += cost;
    });
    return { laborByJob, laborTotal, month: m };
  }, [data]);
}

const jobExpenseTotal = (job) => (job.expenses || []).reduce((s, x) => s + (x.amount || 0), 0);
const isActiveCrew = (c) => c.active !== false;
const isCoreCrew = (c) => c.active !== false && !c.casual;

// Classification review: <20h/wk or inconsistent over a 3+ wk window => casual; consistent >=20h/wk => permanent.
// Returns a suggestion only when it disagrees with the current type (flag for review, never auto-applied).
function classifyReview(c, timeEntries) {
  if (c.active === false) return { suggestion: null };
  const es = (timeEntries || []).filter((e) => e.crewId === c.id);
  if (es.length === 0) return { suggestion: null };
  const maxDate = (timeEntries || []).reduce((m, e) => (e.date > m ? e.date : m), "0000-00-00");
  const lastWk = weekStartOf(maxDate);
  const W = 4;
  const weeks = Array.from({ length: W }, (_, i) => addDays(lastWk, -(W - 1 - i) * 7));
  const wkHours = weeks.map((ws) => es.filter((e) => e.date >= ws && e.date <= addDays(ws, 6)).reduce((s, e) => s + e.hours, 0));
  const present = wkHours.filter((h) => h > 0).length;
  const total = wkHours.reduce((a, b) => a + b, 0);
  const avg = present ? total / present : 0;
  const overallWeeks = new Set(es.map((e) => weekStartOf(e.date))).size;
  const consistent = present >= 3 && avg >= 20;
  const current = c.casual ? "casual" : "permanent";
  const avgR = Math.round(avg);
  if (consistent && current === "casual") return { suggestion: "permanent", reason: `~${avgR}h/wk across ${present} of last ${W} weeks — consistent`, avg, present, W };
  if (!consistent && current === "permanent" && overallWeeks >= 3) {
    const reason = present === 0 ? `no hours in last ${W} weeks` : `~${avgR}h/wk, only ${present} of last ${W} weeks`;
    return { suggestion: "casual", reason, avg, present, W };
  }
  return { suggestion: null };
}
const jobChangeCost = (job) => (job.changes || []).reduce((s, x) => s + (x.cost || 0), 0);
const jobChangeBilled = (job) => (job.changes || []).reduce((s, x) => s + (x.billed || 0), 0);
const jobSubTotal = (job) => (job.subs || []).reduce((s, x) => s + (x.price || 0), 0);

const gcalUrl = (title, startDs, endExclusiveDs, details = "", location = "") =>

const icsHref = (title, startDs, endExclusiveDs, details = "", location = "") => {
  const stamp = new Date().toISOString().replace(/[-:]/g, "").split(".")[0] + "Z";
  const lines = ["BEGIN:VCALENDAR", "VERSION:2.0", "PRODID:-//FieldLedger//EN", "BEGIN:VEVENT",
    "UID:" + Math.random().toString(36).slice(2) + "@fieldledger", "DTSTAMP:" + stamp,
    "DTSTART;VALUE=DATE:" + icsDate(startDs), "DTEND;VALUE=DATE:" + icsDate(endExclusiveDs),
    "SUMMARY:" + title, details ? "DESCRIPTION:" + details : "", location ? "LOCATION:" + location : "",
    "END:VEVENT", "END:VCALENDAR"].filter(Boolean).join("\r\n");
  return "data:text/calendar;charset=utf-8," + encodeURIComponent(lines);
};

// Read a phone photo and downscale it so it fits in storage (~50-150KB)
const compressImage = (file, maxDim = 1200, quality = 0.6) =>
  new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width >= height && width > maxDim) { height = Math.round((height * maxDim) / width); width = maxDim; }
        else if (height > width && height > maxDim) { width = Math.round((width * maxDim) / height); height = maxDim; }
        const canvas = document.createElement("canvas");
        canvas.width = width; canvas.height = height;
        canvas.getContext("2d").drawImage(img, 0, 0, width, height);
        try { resolve(canvas.toDataURL("image/jpeg", quality)); } catch (e) { reject(e); }
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });

function Today({ data, onOpenJob }) {
  const tot = useTotals(data);
  const monthName = new Date().toLocaleDateString("en-US", { month: "long" });

  const coreCrew = data.crew.filter(isCoreCrew);
  const assigned = coreCrew.filter((c) => c.jobId);
  const bench = coreCrew.length - assigned.length;
  const activeJobs = data.jobs.filter((j) => j.status === "active");

  // Job costing roll-up
  const rows = activeJobs.map((j) => {
    const labor = tot.laborByJob[j.id] || 0;
    const exp = jobExpenseTotal(j) + jobChangeCost(j) + jobSubTotal(j);
    const cost = labor + exp;
    const billed = (j.revenue || 0) + jobChangeBilled(j);
    return { j, labor, exp, cost, billed, margin: billed - cost };
  });
  const billed = rows.reduce((s, r) => s + r.billed, 0);
  const cost = rows.reduce((s, r) => s + r.cost, 0);
  const margin = billed - cost;
  const tight = rows.filter((r) => r.j.revenue > 0 && r.margin < 0);

  // This week (Sun–Sat)
  const rateOf = (id) => { const c = data.crew.find((x) => x.id === id); return c ? c.rate || 0 : 0; };
  const wkStart = weekStartOf(todayStr());
  const wkEnd = addDays(wkStart, 6);
  const weekEntries = (data.timeEntries || []).filter((e) => e.date >= wkStart && e.date <= wkEnd);
  const weekHours = weekEntries.reduce((s, e) => s + e.hours, 0);
  const weekCost = weekEntries.reduce((s, e) => s + e.hours * rateOf(e.crewId), 0);
  const weekJobMap = {};
  weekEntries.forEach((e) => {
    const w = (weekJobMap[e.jobId] = weekJobMap[e.jobId] || { hours: 0, cost: 0, crew: new Set() });
    w.hours += e.hours; w.cost += e.hours * rateOf(e.crewId);
    const c = data.crew.find((x) => x.id === e.crewId); if (c) w.crew.add(c.name);
  });
  const weekJobs = Object.entries(weekJobMap).map(([jid, w]) => ({
    job: data.jobs.find((j) => j.id === jid), hours: w.hours, cost: w.cost, crew: [...w.crew],
  })).filter((x) => x.job).sort((a, b) => a.job.name.localeCompare(b.job.name));

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
      {/* This week */}
      <Card>
        <Eyebrow>This week ({shortDate(wkStart)}–{shortDate(wkEnd)})</Eyebrow>
        <div style={{ display: "flex", gap: 16, marginTop: 6 }}>
          <div>
            <div style={{ fontFamily: font.num, fontWeight: 800, fontSize: 30 }}>{Math.round(weekHours * 10) / 10}<span style={{ fontSize: 16, color: T.sub }}>h</span></div>
            <div style={{ fontSize: 12, color: T.sub }}>hours worked</div>
          </div>
          <div style={{ width: 1, background: T.line }} />
          <div>
            <div style={{ fontFamily: font.num, fontWeight: 800, fontSize: 30, color: T.out }}>{fmt(weekCost)}</div>
            <div style={{ fontSize: 12, color: T.sub }}>labour cost</div>
          </div>
        </div>
      </Card>

      <Card>
        <Eyebrow>This week — by job (cost · crew · hours)</Eyebrow>
        <div style={{ marginTop: 6 }}>
          {weekJobs.length === 0 && <div style={{ fontSize: 14, color: T.sub }}>No hours logged this week yet.</div>}
          {weekJobs.map(({ job, hours, cost, crew }) => (
            <div key={job.id} onClick={() => onOpenJob && onOpenJob(job.id)} style={{ padding: "9px 2px", borderBottom: `1px solid ${T.line}`, cursor: "pointer" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
                <span style={{ fontFamily: font.display, fontWeight: 700, fontSize: 15 }}>{job.name} <span style={{ color: T.sub, fontWeight: 600, fontSize: 12 }}>›</span></span>
                <span style={{ fontFamily: font.num, fontWeight: 800, fontSize: 15, fontVariantNumeric: "tabular-nums" }}>
                  {fmt(cost)} <span style={{ color: T.sub, fontWeight: 600, fontSize: 13 }}>· {Math.round(hours * 10) / 10}h</span>
                </span>
              </div>
              <div style={{ fontSize: 12, color: T.sub, marginTop: 2 }}>{crew.join(", ")}</div>
            </div>
          ))}
        </div>
      </Card>
      {/* Signature: active-job margin */}
      <Card>
        <Eyebrow>Active jobs — margin left</Eyebrow>
        <div style={{ fontFamily: font.num, fontWeight: 800, fontSize: 44, lineHeight: 1.1, color: margin >= 0 ? T.in : T.out, fontVariantNumeric: "tabular-nums" }}>
          {fmt(margin)}
        </div>
        <div style={{ fontSize: 13, color: T.sub, marginTop: 2 }}>
          {fmt(billed)} billed · {fmt(cost)} cost on {activeJobs.length} job{activeJobs.length !== 1 ? "s" : ""}
        </div>
      </Card>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
        <Card>
          <Eyebrow>Labor this month</Eyebrow>
          <div style={{ fontFamily: font.num, fontWeight: 800, fontSize: 26 }}>{fmt(tot.laborTotal)}</div>
          <div style={{ fontSize: 12, color: T.sub }}>{data.timeEntries.length} time entries</div>
        </Card>
        <Card>
          <Eyebrow>Crew</Eyebrow>
          <div style={{ fontFamily: font.num, fontWeight: 800, fontSize: 26 }}>
            {assigned.length}<span style={{ color: T.sub, fontSize: 16 }}> /{coreCrew.length} on jobs</span>
          </div>
          <div style={{ fontSize: 12, color: bench ? T.hivis : T.sub, fontWeight: bench ? 700 : 400 }}>
            {bench ? `${bench} unassigned` : "everyone assigned"}

        </Card>
      </div>

      {tight.length > 0 && (
        <Card style={{ borderLeft: `4px solid ${T.out}` }}>
          <Eyebrow color={T.out}>Over budget</Eyebrow>
          <div style={{ fontSize: 14, marginTop: 4 }}>
            {tight.map((r) => r.j.name).join(", ")} {tight.length === 1 ? "is" : "are"} costing more than billed. Check the Jobs tab.

        </Card>
      )}

      <Card>
        <Eyebrow>Job costing</Eyebrow>
        <div style={{ marginTop: 6 }}>

                <div style={{ fontSize: 12, color: T.sub }}>{fmt(billed)} billed · {fmt(cost)} cost</div>
              </div>
              <div style={{ fontFamily: font.num, fontWeight: 700, fontSize: 16, color: margin >= 0 ? T.in : T.out, fontVariantNumeric: "tabular-nums" }}>
                {fmt(margin)}
              </div>
            </div>
          ))}
        </div>
      </Card>
    </div>
  );
}

// ---------- SCHEDULE ----------
const addDays = (ds, n) => {
  const d = new Date(ds + "T00:00:00");
  d.setDate(d.getDate() + n);
  return d.toISOString().slice(0, 10);
};
const shortDate = (ds) => new Date(ds + "T00:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric" });
const weekStart = (ds) => { const d = new Date(ds + "T00:00:00"); const dow = (d.getDay() + 6) % 7; d.setDate(d.getDate() - dow); return d.toISOString().slice(0, 10); };
const isoWeek = (ds) => { const d = new Date(ds + "T00:00:00"); d.setHours(0, 0, 0, 0); d.setDate(d.getDate() + 3 - ((d.getDay() + 6) % 7)); const w1 = new Date(d.getFullYear(), 0, 4); return 1 + Math.round(((d - w1) / 86400000 - 3 + ((w1.getDay() + 6) % 7)) / 7); };

function Schedule({ data, save }) {
  const [day, setDay] = useState(todayStr());
  const [view, setView] = useState("day"); // "day" | "month"
  const [monthAnchor, setMonthAnchor] = useState(todayStr().slice(0, 7) + "-01");
  const [booking, setBooking] = useState(false);
  const [bk, setBk] = useState({ crew: {}, jobId: "", start: todayStr(), end: todayStr(), skipWeekends: true });
  const schedule = data.schedule || [];
  const activeJobs = data.jobs.filter((j) => j.status === "active");
  const coreCrewList = data.crew.filter(isCoreCrew);
  const coreIds = new Set(coreCrewList.map((c) => c.id));
  const totalCrew = coreCrewList.length;

  const shiftMonth = (n) => {
    const dt = new Date(monthAnchor + "T00:00:00");
    dt.setMonth(dt.getMonth() + n);
    setMonthAnchor(`${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, "0")}-01`);
  };

  const availOn = (ds) => totalCrew - new Set(schedule.filter((s) => s.date === ds && coreIds.has(s.crewId)).map((s) => s.crewId)).size;

  // Next day (from today) where at least one crew member is free
  const nextOpen = (() => {
    if (totalCrew === 0) return null;
    for (let i = 0; i < 90; i++) {
      const ds = addDays(todayStr(), i);
      if (availOn(ds) > 0) return ds;
    }
    return null;
  })();
  const nextAllFree = (() => {
    if (totalCrew === 0) return null;
    for (let i = 0; i < 90; i++) {
      const ds = addDays(todayStr(), i);
      if (availOn(ds) === totalCrew) return ds;
    }
    return null;
  })();

  const shiftDay = (n) => setDay(addDays(day, n));
  const onDay = schedule.filter((s) => s.date === day);

  // For a crew member on a job, find the unbroken run of days that includes `date`
  const runFor = (crewId, jobId, date) => {
    const set = new Set(schedule.filter((s) => s.crewId === crewId && s.jobId === jobId).map((s) => s.date));
    let start = date, end = date;
    while (set.has(addDays(start, -1))) start = addDays(start, -1);
    while (set.has(addDays(end, 1))) end = addDays(end, 1);
    const days = Math.round((new Date(end + "T00:00:00") - new Date(start + "T00:00:00")) / 86400000) + 1;
    const idx = Math.round((new Date(date + "T00:00:00") - new Date(start + "T00:00:00")) / 86400000) + 1;
    return { start, end, days, idx };
  };

  const removeDay = (crewId) =>
    save({ ...data, schedule: schedule.filter((s) => !(s.crewId === crewId && s.date === day)), seeded: false });

  const clearRun = (crewId, jobId) => {
    const { start, end } = runFor(crewId, jobId, day);
    save({ ...data, schedule: schedule.filter((s) => !(s.crewId === crewId && s.jobId === jobId && s.date >= start && s.date <= end)), seeded: false });
  };

  // ----- Multi-day booking -----
  const bkDays = (() => {
    if (!bk.start) return [];
    const end = bk.end && bk.end >= bk.start ? bk.end : bk.start;
    const out = [];
    let d = bk.start, guard = 0;
    while (d <= end && guard < 200) {
      const dow = new Date(d + "T00:00:00").getDay();
      if (!(bk.skipWeekends && (dow === 0 || dow === 6))) out.push(d);
      d = addDays(d, 1);
      guard++;
    }
    return out;
  })();
  const bkCrewIds = Object.keys(bk.crew).filter((k) => bk.crew[k]);

  const book = () => {
    if (!bkCrewIds.length || !bk.jobId || bkDays.length === 0) return;
    let next = [...schedule];
    bkCrewIds.forEach((cid) => {
      bkDays.forEach((dt) => {
        next = next.filter((s) => !(s.crewId === cid && s.date === dt)); // move if already booked that day
        next.push({ id: uid(), crewId: cid, jobId: bk.jobId, date: dt });
      });
    });
    save({ ...data, schedule: next, seeded: false });
    setBooking(false);
    setBk({ crew: {}, jobId: "", start: day, end: day, skipWeekends: true });

  const scheduledIds = new Set(onDay.map((s) => s.crewId));

    .map((s) => ({ s, c: data.crew.find((x) => x.id === s.crewId), j: data.jobs.find((x) => x.id === s.jobId), run: runFor(s.crewId, s.jobId, day) }))

  const isToday = day === todayStr();

    const ds = addDays(todayStr(), i);
    return { ds, dow: new Date(ds + "T00:00:00").toLocaleDateString("en-US", { weekday: "short" }).slice(0, 2), dom: new Date(ds + "T00:00:00").getDate(), count: schedule.filter((s) => s.date === ds).length };
  });

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
      {/* View toggle */}
      <div style={{ display: "flex", gap: 6, background: T.inkSoft, padding: 4, borderRadius: 12 }}>
        {[{ id: "day", label: "Day view" }, { id: "month", label: "Month calendar" }].map((v) => (
          <button key={v.id} onClick={() => setView(v.id)}
            style={{ flex: 1, padding: "9px 0", borderRadius: 9, border: "none", cursor: "pointer",
              fontFamily: font.display, fontWeight: 700, fontSize: 14, letterSpacing: "0.02em",
              background: view === v.id ? "#fff" : "transparent", color: view === v.id ? T.ink : T.sub,
              boxShadow: view === v.id ? "0 1px 3px rgba(0,0,0,.12)" : "none" }}>
            {v.label}
          </button>
        ))}
      </div>

      {view === "month" && (() => {
        const first = new Date(monthAnchor + "T00:00:00");

            <Card>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 4, marginBottom: 6 }}>
                {["S", "M", "T", "W", "T", "F", "S"].map((d, i) => (

            <div style={{ fontSize: 10, fontWeight: 700, color: day === s.ds ? T.hivis : (s.count ? T.in : T.sub) }}>{s.count ? `${s.count} on` : "—"}</div>
          </button>
        ))}

      {/* Day header + nav */}
      <Card style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <Btn small kind="ghost" onClick={() => shiftDay(-1)}>‹</Btn>
        <div style={{ textAlign: "center" }}>
          <div style={{ fontFamily: font.display, fontWeight: 800, fontSize: 17 }}>{dayLabel}</div>
          <div style={{ fontSize: 12, color: isToday ? T.hivis : T.sub, fontWeight: 600 }}>
            {isToday ? "TODAY · " : ""}{booked.length} booked · {available.length} available
          </div>
        </div>
        <Btn small kind="ghost" onClick={() => shiftDay(1)}>›</Btn>
      </Card>

      {/* Book crew (multi-day) */}
      <Btn onClick={() => setBooking(!booking)} style={{ width: "100%" }}>{booking ? "Close booking" : "+ Book crew (one or more days)"}</Btn>
      {booking && (
        <Card>
          <Field label="Who">
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
              {data.crew.filter(isCoreCrew).map((c) => (
                <button key={c.id} onClick={() => setBk({ ...bk, crew: { ...bk.crew, [c.id]: !bk.crew[c.id] } })}
                  style={{ padding: "7px 12px", borderRadius: 999, cursor: "pointer", fontFamily: font.display, fontWeight: 600, fontSize: 13,
                    border: `1.5px solid ${bk.crew[c.id] ? T.hivis : T.line}`, background: bk.crew[c.id] ? T.hivis : "#fff", color: bk.crew[c.id] ? "#fff" : T.ink }}>
                  {c.name}
                </button>
              ))}
              {data.crew.length === 0 && <span style={{ fontSize: 13, color: T.sub }}>Add crew on the Crew tab first.</span>}
            </div>
          </Field>
          <Field label="Where (job)">
            <select style={inputStyle} value={bk.jobId} onChange={(e) => setBk({ ...bk, jobId: e.target.value })}>
              <option value="">Pick a job…</option>
              {activeJobs.map((j) => <option key={j.id} value={j.id}>{j.name}</option>)}
            </select>
          </Field>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
            <Field label="From"><input style={inputStyle} type="date" value={bk.start} onChange={(e) => setBk({ ...bk, start: e.target.value })} /></Field>
            <Field label="To"><input style={inputStyle} type="date" value={bk.end} onChange={(e) => setBk({ ...bk, end: e.target.value })} /></Field>
          </div>
          <label style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 14, color: T.ink, marginBottom: 10, cursor: "pointer" }}>
            <input type="checkbox" checked={bk.skipWeekends} onChange={(e) => setBk({ ...bk, skipWeekends: e.target.checked })} style={{ width: 18, height: 18 }} />
            Skip weekends
          </label>
          <div style={{ fontSize: 13, color: T.sub, marginBottom: 10 }}>
            {bkCrewIds.length && bk.jobId && bkDays.length
              ? <><b style={{ color: T.ink }}>{bkCrewIds.length}</b> crew × <b style={{ color: T.ink }}>{bkDays.length}</b> day{bkDays.length > 1 ? "s" : ""} = <b style={{ color: T.ink }}>{bkCrewIds.length * bkDays.length}</b> shifts{bkDays.length ? ` (${shortDate(bkDays[0])}–${shortDate(bkDays[bkDays.length - 1])})` : ""}</>
              : "Pick crew, a job, and a date range."}
          </div>
          <Btn onClick={book} style={{ width: "100%", opacity: bkCrewIds.length && bk.jobId && bkDays.length ? 1 : 0.4 }}>Book it</Btn>
        </Card>
      )}

      {/* Booked: who / where / how long */}
      <Card style={{ borderLeft: `4px solid ${booked.length ? T.in : T.line}` }}>
        <Eyebrow color={T.in}>Booked {dayLabel.split(",")[0]} · {booked.length}</Eyebrow>
        {booked.length === 0 ? (
          <div style={{ fontSize: 14, marginTop: 8, color: T.sub }}>Nobody booked this day yet.</div>
        ) : (
          <div style={{ marginTop: 6 }}>
            {booked.map(({ s, c, j, run }) => (
              <div key={s.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 0", borderBottom: `1px solid ${T.line}` }}>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontFamily: font.display, fontWeight: 700, fontSize: 16 }}>{c.name}</div>
                  <div style={{ fontSize: 13, color: T.ink }}>{j ? j.name : "—"}</div>
                  <div style={{ fontSize: 12, color: T.sub, marginTop: 1 }}>
                    {run.days === 1
                      ? "single day"
                      : `${run.days} days · ${shortDate(run.start)}–${shortDate(run.end)} · day ${run.idx} of ${run.days}`}
                  </div>
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                  <button onClick={() => removeDay(c.id)} style={{ background: T.inkSoft, border: "none", color: T.ink, borderRadius: 8, padding: "5px 9px", cursor: "pointer", fontFamily: font.display, fontWeight: 600, fontSize: 12 }}>Off this day</button>
                  {run.days > 1 && <button onClick={() => clearRun(c.id, s.jobId)} style={{ background: "transparent", border: `1px solid ${T.line}`, color: T.out, borderRadius: 8, padding: "5px 9px", cursor: "pointer", fontFamily: font.display, fontWeight: 600, fontSize: 12 }}>Clear run</button>}
                </div>
              </div>
            ))}
          </div>
        )}
      </Card>

      {/* Available next */}
      <Card style={{ borderLeft: `4px solid ${available.length ? T.hivis : T.line}` }}>
        <Eyebrow color={available.length ? T.hivis : T.sub}>Available {dayLabel.split(",")[0]} · {available.length}</Eyebrow>
        {available.length === 0 ? (
          <div style={{ fontSize: 14, marginTop: 6 }}>Everyone is booked this day.</div>
        ) : (
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 8 }}>
            {available.map((c) => (
              <button key={c.id}
                onClick={() => setBk({ crew: { [c.id]: true }, jobId: "", start: day, end: day, skipWeekends: true }) || setBooking(true)}
                style={{ background: T.hivisSoft, color: T.hivis, border: "none", borderRadius: 999, padding: "7px 12px", cursor: "pointer", fontFamily: font.display, fontWeight: 700, fontSize: 13 }}>
                {c.name} +
              </button>
            ))}
          </div>
        )}
        <div style={{ fontSize: 12, color: T.sub, marginTop: 8 }}>Tap an available name to start a booking with them on this day.</div>
      </Card>
      </>)}
    </div>
  );
}

// ---------- CREW ----------
function Crew({ data, save }) {
  const [adding, setAdding] = useState(false);
  const [importing, setImporting] = useState(false);
  const [logFor, setLogFor] = useState(null);
  const [rateFor, setRateFor] = useState(null);
  const [rateVal, setRateVal] = useState("");
  const [form, setForm] = useState({ name: "", rate: "", jobId: "" });
  const [log, setLog] = useState({ hours: "", date: todayStr() });
  const [sheetUrl, setSheetUrl] = useState("");
  const [paste, setPaste] = useState("");
  const [importMsg, setImportMsg] = useState(null);
  const tot = useTotals(data);

  const addGuy = () => {
    if (!form.name || !form.rate) return;
    save({ ...data, crew: [...data.crew, { id: uid(), name: form.name, rate: parseFloat(form.rate), jobId: form.jobId || null }], seeded: false });
    setForm({ name: "", rate: "", jobId: "" });
    setAdding(false);
  };

  const assign = (crewId, jobId) =>
    save({ ...data, crew: data.crew.map((c) => (c.id === crewId ? { ...c, jobId: jobId || null } : c)) });

  const saveRate = (id) => {
    const r = parseFloat(rateVal);
    if (isNaN(r) || r <= 0) return;
    save({ ...data, crew: data.crew.map((c) => (c.id === id ? { ...c, rate: r } : c)) });
    setRateFor(null);
    setRateVal("");
  };

  const logHours = (guy) => {
    if (!log.hours || !guy.jobId) return;
    save({
      ...data,
      timeEntries: [...data.timeEntries, { id: uid(), crewId: guy.id, jobId: guy.jobId, hours: parseFloat(log.hours), date: log.date }],
      seeded: false,
    });
    setLog({ hours: "", date: todayStr() });
    setLogFor(null);
  };

  const removeGuy = (id) => {
    save({ ...data, crew: data.crew.filter((c) => c.id !== id) });
  };

  // ----- Google Form hours import -----
  const importRows = (text) => {
    const lines = text.trim().split(/\r?\n/).filter((l) => l.trim());
    const entries = [];
    const skipped = [];
    lines.forEach((line, i) => {
      let parts;
      if (line.includes("\t")) parts = line.split("\t");
      else if (line.includes(",")) parts = line.split(",");
      else parts = line.split(/\s{2,}/); // PDF columns separated by gaps
      parts = parts.map((p) => p.replace(/^"|"$/g, "").trim()).filter((p) => p !== "");
      // Drop Google Forms timestamp column if present (looks like 6/12/2026 14:03:11)
      if (parts.length >= 4 && /\d{1,2}\/\d{1,2}\/\d{2,4}\s+\d{1,2}:/.test(parts[0])) parts = parts.slice(1);
      // Skip an obvious header row
      if (i === 0 && /name/i.test(parts[0] || "") && /hour/i.test(line)) return;
      const [nameRaw, jobRaw, hoursRaw, dateRaw] = parts;
      const guy = data.crew.find((c) => nameRaw && c.name.toLowerCase() === nameRaw.toLowerCase())
        || data.crew.find((c) => nameRaw && nameRaw.toLowerCase().includes(c.name.toLowerCase()));
      const job = data.jobs.find((j) => jobRaw && j.name.toLowerCase() === jobRaw.toLowerCase())
        || data.jobs.find((j) => jobRaw && j.name.toLowerCase().includes(jobRaw.toLowerCase()))
        || data.jobs.find((j) => jobRaw && jobRaw.toLowerCase().includes(j.name.toLowerCase()));
      const hours = parseFloat(hoursRaw);
      if (!guy) { skipped.push(`Row ${i + 1}: no crew match for "${nameRaw || "?"}"`); return; }
      if (!job) { skipped.push(`Row ${i + 1}: no job match for "${jobRaw || "?"}"`); return; }
      if (isNaN(hours) || hours <= 0) { skipped.push(`Row ${i + 1}: bad hours "${hoursRaw || "?"}"`); return; }
      entries.push({ id: uid(), crewId: guy.id, jobId: job.id, hours, date: parseDateFlexible(dateRaw) || todayStr() });
    });
    if (entries.length) {
      save({ ...data, timeEntries: [...data.timeEntries, ...entries], seeded: false });
    }
    setImportMsg(
      `${entries.length} time ${entries.length === 1 ? "entry" : "entries"} imported.` +
      (skipped.length ? ` Skipped ${skipped.length}: ${skipped.slice(0, 3).join("; ")}${skipped.length > 3 ? "…" : ""}` : "")
    );
    if (entries.length) setPaste("");
  };

  const fetchSheet = async () => {
    if (!sheetUrl) return;
    setImportMsg("Trying to reach the sheet…");
    try {
      const r = await fetch(sheetUrl);
      if (!r.ok) throw new Error("bad response");
      const text = await r.text();
      if (text.trim().startsWith("<")) throw new Error("got a webpage, not CSV");
      importRows(text);
    } catch {
      setImportMsg("Couldn't reach the sheet from inside this app (the app's sandbox blocks most outside connections). Use the paste box or PDF upload instead.");
    }
  };

  // ----- PDF import (e.g. a Google Form responses PDF) -----
  const loadPdfJs = () =>
    new Promise((resolve, reject) => {
      if (window.pdfjsLib) return resolve(window.pdfjsLib);
      const s = document.createElement("script");
      s.src = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
      s.onload = () => {
        try {
          window.pdfjsLib.GlobalWorkerOptions.workerSrc =
            "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
        } catch (e) {}
        resolve(window.pdfjsLib);
      };
      s.onerror = () => reject(new Error("script load failed"));
      document.body.appendChild(s);
    });

  const handlePdf = async (file) => {
    if (!file) return;
    setImportMsg("Reading PDF…");
    try {
      const pdfjsLib = await loadPdfJs();
      const buf = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
      let allText = "";
      for (let p = 1; p <= pdf.numPages; p++) {
        const page = await pdf.getPage(p);
        const content = await page.getTextContent();
        // Rebuild lines by grouping text items on the same vertical position
        const rows = {};
        content.items.forEach((it) => {
          const y = Math.round(it.transform[5]);
          (rows[y] = rows[y] || []).push({ x: it.transform[4], str: it.str });
        });
        Object.keys(rows)
          .map(Number)
          .sort((a, b) => b - a) // top of page first
          .forEach((y) => {
            const line = rows[y]
              .sort((a, b) => a.x - b.x)
              .map((c) => c.str)
              .join("  ") // double space marks a column gap
              .replace(/\s{3,}/g, "  ")
              .trim();
            if (line) allText += line + "\n";
          });
      }
      if (!allText.trim()) throw new Error("no text — PDF may be scanned images");
      importRows(allText);
    } catch (e) {
      setImportMsg(
        "Couldn't read that PDF in-app" +
          (/scanned/.test(e.message) ? " (it looks like scanned images, which need OCR). " : " (the sandbox may have blocked the PDF reader). ") +
          "The paste box always works: open the form's response sheet, copy the rows, paste above."
      );
    }
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8 }}>
        <Eyebrow>Crew · {data.crew.filter(isCoreCrew).length} on the books</Eyebrow>
        <div style={{ display: "flex", gap: 6 }}>
          <Btn small kind="ink" onClick={() => { setImporting(!importing); setAdding(false); }}>{importing ? "Close" : "Import hours"}</Btn>
          <Btn small onClick={() => { setAdding(!adding); setImporting(false); }}>{adding ? "Close" : "+ Add"}</Btn>
        </div>
      </div>

      {importing && (
        <Card>
          <Eyebrow color={T.hivis}>Hours from your Google Form</Eyebrow>
          <div style={{ fontSize: 13, color: T.sub, margin: "6px 0 10px", lineHeight: 1.45 }}>
            Set your form's answers in this order: <b>Name, Job, Hours, Date</b>. Then import three ways: upload a <b>PDF</b> of the form responses, paste a published-CSV link and tap Fetch, or copy rows from the response sheet and paste them in. Names and jobs match what's in this app.
          </div>

          <label style={{ display: "block", marginBottom: 10 }}>
            <div
              style={{
                background: T.hivisSoft, color: T.hivis, border: `1.5px dashed ${T.hivis}`,
                borderRadius: 10, padding: "14px 12px", textAlign: "center", cursor: "pointer",
                fontFamily: font.display, fontWeight: 700, fontSize: 15,
              }}
            >
              ⬆ Upload PDF of form responses
            </div>
            <input
              type="file"
              accept="application/pdf,.pdf"
              style={{ display: "none" }}
              onChange={(e) => { handlePdf(e.target.files[0]); e.target.value = ""; }}
            />
          </label>

          <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
            <input style={{ ...inputStyle, flex: 1 }} placeholder="Published CSV link (optional)" value={sheetUrl} onChange={(e) => setSheetUrl(e.target.value)} />
            <Btn small kind="ink" onClick={fetchSheet}>Fetch</Btn>
          </div>
          <textarea
            style={{ ...inputStyle, minHeight: 90, fontFamily: font.body, resize: "vertical" }}
            placeholder={"Paste rows here, e.g.\nVictor Veliz\tFinchley\t8\t6/12/2026\nRichard Opoku Forson, Nicolet, 8, 6/12/2026"}
            value={paste}
            onChange={(e) => setPaste(e.target.value)}
          />
          <Btn onClick={() => paste.trim() && importRows(paste)} style={{ width: "100%", marginTop: 8 }}>Import pasted hours</Btn>
          {importMsg && <div style={{ marginTop: 8, fontSize: 13, fontWeight: 600, color: T.ink }}>{importMsg}</div>}
        </Card>
      )}

      {adding && (
        <Card>
          <Field label="Name">
            <input style={inputStyle} value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })} placeholder="First name" />
          </Field>
          <Field label="Cost rate ($/hr — wage + burden)">
            <input style={inputStyle} type="number" inputMode="decimal" value={form.rate} onChange={(e) => setForm({ ...form, rate: e.target.value })} placeholder="32" />
          </Field>
          <Field label="Assign to job">
            <select style={inputStyle} value={form.jobId} onChange={(e) => setForm({ ...form, jobId: e.target.value })}>
              <option value="">Unassigned for now</option>
              {data.jobs.filter((j) => j.status === "active").map((j) => (
                <option key={j.id} value={j.id}>{j.name}</option>
              ))}
            </select>
          </Field>
          <Btn onClick={addGuy} style={{ width: "100%" }}>Add to crew</Btn>
        </Card>
      )}

      {data.crew.filter(isCoreCrew).map((c) => {
        const weekCost = data.timeEntries
          .filter((e) => e.crewId === c.id && e.date.startsWith(tot.month))
          .reduce((s, e) => s + e.hours * c.rate, 0);
        return (
          <Card key={c.id} style={{ borderLeft: c.jobId ? `4px solid ${T.in}` : `4px solid ${T.hivis}` }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
              <div style={{ fontFamily: font.display, fontWeight: 700, fontSize: 19 }}>{c.name}</div>
              {rateFor === c.id ? (
                <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                  <input
                    style={{ ...inputStyle, width: 86, padding: "6px 8px" }}
                    type="number" inputMode="decimal" autoFocus
                    value={rateVal}
                    onChange={(e) => setRateVal(e.target.value)}
                    placeholder={String(c.rate)}
                  />
                  <Btn small onClick={() => saveRate(c.id)}>Set</Btn>
                </div>
              ) : (
                <button
                  onClick={() => { setRateFor(c.id); setRateVal(String(c.rate)); }}
                  style={{ background: T.inkSoft, border: "none", borderRadius: 8, padding: "5px 10px", cursor: "pointer", fontFamily: font.num, fontWeight: 700, fontSize: 14, color: T.ink }}
                >
                  ${c.rate}/hr ✎
                </button>
              )}
            </div>
            <div style={{ fontSize: 12, color: T.sub, marginBottom: 8 }}>
              {fmt(weekCost)} labor this month
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <select
                value={c.jobId || ""}
                onChange={(e) => assign(c.id, e.target.value)}
                style={{ ...inputStyle, flex: 1, padding: "9px 10px" }}
              >
                <option value="">Unassigned</option>
                {data.jobs.filter((j) => j.status === "active").map((j) => (
                  <option key={j.id} value={j.id}>{j.name}</option>
                ))}
              </select>
              <Btn small kind="ink" onClick={() => setLogFor(logFor === c.id ? null : c.id)} style={{ opacity: c.jobId ? 1 : 0.4 }}>
                Log hrs
              </Btn>
              <Btn small kind="danger" onClick={() => removeGuy(c.id)}>×</Btn>
            </div>
            {logFor === c.id && c.jobId && (
              <div style={{ marginTop: 10, display: "flex", gap: 8 }}>
                <input style={{ ...inputStyle, flex: 1 }} type="number" inputMode="decimal" placeholder="Hours" value={log.hours} onChange={(e) => setLog({ ...log, hours: e.target.value })} />
                <input style={{ ...inputStyle, flex: 1.4 }} type="date" value={log.date} onChange={(e) => setLog({ ...log, date: e.target.value })} />
                <Btn small onClick={() => logHours(c)}>Save</Btn>
              </div>
            )}
          </Card>
        );
      })}
    </div>
  );
}

// ---------- JOBS ----------
const fmtRange = (s, e) => {
  if (!s && !e) return "";
  const f = (x) => (x ? new Date(x + "T00:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric" }) : "?");
  if (s && e) return `${f(s)} – ${f(e)}`;
  return s ? `from ${f(s)}` : `by ${f(e)}`;
};
const daysLeft = (end) => {
  if (!end) return null;
  const ms = new Date(end + "T00:00:00") - new Date(todayStr() + "T00:00:00");
  return Math.round(ms / 86400000);
};

function Jobs({ data, save, focusJob, clearFocus }) {
  const [adding, setAdding] = useState(false);
  const [editId, setEditId] = useState(null);
  const [confirmDel, setConfirmDel] = useState(null);
  const [form, setForm] = useState({ name: "", client: "", revenue: "", address: "", start: "", end: "" });
  const [edit, setEdit] = useState({});
  const [picked, setPicked] = useState({});
  const [expOpen, setExpOpen] = useState(null);
  const [expForm, setExpForm] = useState({});
  const [coOpen, setCoOpen] = useState(null);
  const [coForm, setCoForm] = useState({});
  const [subOpen, setSubOpen] = useState(null);
  const [subForm, setSubForm] = useState({});
  const [crewOpen, setCrewOpen] = useState(null);
  const [viewPhoto, setViewPhoto] = useState(null);
  const [photoBusy, setPhotoBusy] = useState(null);
  const tot = useTotals(data);

  // Order jobs by most-recent reported hours (newest at top, no/oldest activity at bottom)
  const lastHrOf = (jid) => {
    const ds = (data.timeEntries || []).filter((e) => e.jobId === jid).map((e) => e.date);
    return ds.length ? ds.reduce((a, b) => (a > b ? a : b)) : "";
  };
  const jobsSorted = [...data.jobs].sort((a, b) => lastHrOf(b.id).localeCompare(lastHrOf(a.id)));

  // Drill-in from Today: open this job's crew detail and scroll to it
  useEffect(() => {
    if (focusJob) {
      setCrewOpen(focusJob);
      if (typeof document !== "undefined") {
        const el = document.getElementById("job-" + focusJob);
        if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
      }
      clearFocus && clearFocus();
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [focusJob]);

  const addJob = () => {
    if (!form.name) return;
    const jobId = uid();
    save({
      ...data,
      jobs: [...data.jobs, { id: jobId, name: form.name, client: form.client, address: form.address || "", revenue: parseFloat(form.revenue || 0), status: "active", start: form.start || "", end: form.end || "", expenses: [], changes: [] }],
      crew: data.crew.map((c) => (picked[c.id] ? { ...c, jobId } : c)),
      seeded: false,
    });
    setForm({ name: "", client: "", revenue: "", address: "", start: "", end: "" });
    setPicked({});
    setAdding(false);
  };

  const startEdit = (j) => {
    setEditId(j.id);
    setEdit({ name: j.name, client: j.client || "", revenue: String(j.revenue ?? ""), address: j.address || "", start: j.start || "", end: j.end || "" });
    setConfirmDel(null);
  };

  const saveEdit = (id) => {
    if (!edit.name) return;
    save({
      ...data,
      jobs: data.jobs.map((j) => (j.id === id ? { ...j, name: edit.name, client: edit.client, address: edit.address || "", revenue: parseFloat(edit.revenue || 0), start: edit.start || "", end: edit.end || "" } : j)),
      seeded: false,
    });
    setEditId(null);
  };

  const deleteJob = (id) => {
    if (confirmDel !== id) { setConfirmDel(id); setTimeout(() => setConfirmDel((c) => (c === id ? null : c)), 3500); return; }
    save({
      ...data,
      jobs: data.jobs.filter((j) => j.id !== id),
      crew: data.crew.map((c) => (c.jobId === id ? { ...c, jobId: null } : c)),
      schedule: (data.schedule || []).filter((s) => s.jobId !== id),
      timeEntries: data.timeEntries.filter((e) => e.jobId !== id),
      seeded: false,
    });
    setConfirmDel(null);
    setEditId(null);
  };

  const attachPhoto = async (jobId, file) => {
    if (!file) return;
    setPhotoBusy(jobId);
    try {
      const dataUrl = await compressImage(file);
      setExpForm((p) => ({ ...p, [jobId]: { ...p[jobId], photo: dataUrl } }));
    } catch (e) {
      // ignore; user can retry
    }
    setPhotoBusy(null);
  };

  const addExpense = (jobId) => {
    const e = expForm[jobId] || {};
    const amt = parseFloat(e.amount);
    if (!e.label || isNaN(amt) || amt <= 0) return;
    save({
      ...data,
      jobs: data.jobs.map((j) => (j.id === jobId ? { ...j, expenses: [...(j.expenses || []), { id: uid(), label: e.label.trim(), amount: amt, date: e.date || todayStr(), photo: e.photo || "" }] } : j)),
      seeded: false,
    });
    setExpForm({ ...expForm, [jobId]: { label: "", amount: "", date: todayStr(), photo: "" } });
  };

  const removeExpense = (jobId, expId) =>
    save({ ...data, jobs: data.jobs.map((j) => (j.id === jobId ? { ...j, expenses: (j.expenses || []).filter((x) => x.id !== expId) } : j)), seeded: false });

  const addChange = (jobId) => {
    const e = coForm[jobId] || {};
    const cost = parseFloat(e.cost || 0);
    const billed = parseFloat(e.billed || 0);
    if (!e.label || (isNaN(cost) && isNaN(billed))) return;
    save({
      ...data,
      jobs: data.jobs.map((j) => (j.id === jobId ? { ...j, changes: [...(j.changes || []), { id: uid(), label: e.label.trim(), cost: isNaN(cost) ? 0 : cost, billed: isNaN(billed) ? 0 : billed, date: e.date || todayStr() }] } : j)),
      seeded: false,
    });
    setCoForm({ ...coForm, [jobId]: { label: "", cost: "", billed: "", date: todayStr() } });
  };

  const removeChange = (jobId, coId) =>
    save({ ...data, jobs: data.jobs.map((j) => (j.id === jobId ? { ...j, changes: (j.changes || []).filter((x) => x.id !== coId) } : j)), seeded: false });

  const addSub = (jobId) => {
    const e = subForm[jobId] || {};
    const price = parseFloat(e.price || 0);
    if (!e.name || !e.name.trim()) return;
    save({
      ...data,
      jobs: data.jobs.map((j) => (j.id === jobId ? { ...j, subs: [...(j.subs || []), { id: uid(), name: e.name.trim(), price: isNaN(price) ? 0 : price, scope: (e.scope || "").trim() }] } : j)),
      seeded: false,
    });
    setSubForm({ ...subForm, [jobId]: { name: "", price: "", scope: "" } });
  };

  const removeSub = (jobId, subId) =>
    save({ ...data, jobs: data.jobs.map((j) => (j.id === jobId ? { ...j, subs: (j.subs || []).filter((x) => x.id !== subId) } : j)), seeded: false });

  const toggleStatus = (id) =>
    save({ ...data, jobs: data.jobs.map((j) => (j.id === id ? { ...j, status: j.status === "active" ? "done" : "active" } : j)) });

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <Eyebrow>Jobs · revenue vs labor</Eyebrow>
        <Btn small onClick={() => { setAdding(!adding); setEditId(null); }}>{adding ? "Close" : "+ Add job"}</Btn>
      </div>

      {adding && (
        <Card>
          <Field label="Job name"><input style={inputStyle} value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })} placeholder="Smith deck rebuild" /></Field>
          <Field label="Client"><input style={inputStyle} value={form.client} onChange={(e) => setForm({ ...form, client: e.target.value })} /></Field>
          <Field label="Contract / billed amount ($)"><input style={inputStyle} type="number" inputMode="decimal" value={form.revenue} onChange={(e) => setForm({ ...form, revenue: e.target.value })} /></Field>
          <Field label="Address (for Google Maps)"><input style={inputStyle} value={form.address} onChange={(e) => setForm({ ...form, address: e.target.value })} placeholder="2335 rue de Bordeaux, Montreal" /></Field>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
            <Field label="Start date"><input style={inputStyle} type="date" value={form.start} onChange={(e) => setForm({ ...form, start: e.target.value })} /></Field>
            <Field label="Target end date"><input style={inputStyle} type="date" value={form.end} onChange={(e) => setForm({ ...form, end: e.target.value })} /></Field>
          </div>
          <Field label="Put crew on it now">
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
              {data.crew.filter(isCoreCrew).map((c) => (
                <button
                  key={c.id}
                  onClick={() => setPicked({ ...picked, [c.id]: !picked[c.id] })}
                  style={{
                    padding: "7px 12px", borderRadius: 999, cursor: "pointer",
                    fontFamily: font.display, fontWeight: 600, fontSize: 13,
                    border: `1.5px solid ${picked[c.id] ? T.hivis : T.line}`,
                    background: picked[c.id] ? T.hivis : "#fff",
                    color: picked[c.id] ? "#fff" : T.ink,
                  }}
                >
                  {c.name}{c.jobId && !picked[c.id] ? " (busy)" : ""}
                </button>
              ))}
              {data.crew.length === 0 && <span style={{ fontSize: 13, color: T.sub }}>No crew yet — add them on the Crew tab.</span>}
            </div>
          </Field>
          <Btn onClick={addJob} style={{ width: "100%" }}>Add job{Object.values(picked).filter(Boolean).length ? ` + assign ${Object.values(picked).filter(Boolean).length}` : ""}</Btn>
        </Card>
      )}

      <Card style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "10px 14px" }}>
        <div>
          <div style={{ fontFamily: font.display, fontWeight: 700, fontSize: 14 }}>Overhead</div>
          <div style={{ fontSize: 11, color: T.sub }}>G&amp;A applied to revenue, for net margin</div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          <input type="number" inputMode="decimal" value={Math.round((data.overheadPct ?? 0.10) * 100)}
            onChange={(e) => { const v = Math.max(0, Math.min(100, parseFloat(e.target.value) || 0)); save({ ...data, overheadPct: v / 100 }); }}
            style={{ ...inputStyle, width: 70, textAlign: "right" }} />
          <span style={{ fontFamily: font.num, fontWeight: 700, fontSize: 15 }}>%</span>
        </div>
      </Card>

      {jobsSorted.map((j) => {
        const labor = tot.laborByJob[j.id] || 0;
        const materials = jobExpenseTotal(j);
        const subsTotal = jobSubTotal(j);
        const coCost = jobChangeCost(j);
        const coBilled = jobChangeBilled(j);
        const cost = labor + materials + subsTotal + coCost;
        const billed = (j.revenue || 0) + coBilled;
        const gross = billed - cost;
        const grossPct = billed > 0 ? (gross / billed) * 100 : 0;
        const overhead = billed * (data.overheadPct ?? 0.10);
        const net = gross - overhead;
        const netPct = billed > 0 ? (net / billed) * 100 : 0;
        const pct = billed > 0 ? Math.min(100, (cost / billed) * 100) : 0;
        const guys = data.crew.filter((c) => c.jobId === j.id).map((c) => c.name);
        const dl = daysLeft(j.end);

        if (editId === j.id) {
          return (
            <Card key={j.id} style={{ borderLeft: `4px solid ${T.ink}` }}>
              <Field label="Job name"><input style={inputStyle} value={edit.name} onChange={(e) => setEdit({ ...edit, name: e.target.value })} /></Field>
              <Field label="Client"><input style={inputStyle} value={edit.client} onChange={(e) => setEdit({ ...edit, client: e.target.value })} /></Field>
              <Field label="Contract / billed amount ($)"><input style={inputStyle} type="number" inputMode="decimal" value={edit.revenue} onChange={(e) => setEdit({ ...edit, revenue: e.target.value })} /></Field>
              <Field label="Address (for Google Maps)"><input style={inputStyle} value={edit.address} onChange={(e) => setEdit({ ...edit, address: e.target.value })} /></Field>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                <Field label="Start date"><input style={inputStyle} type="date" value={edit.start} onChange={(e) => setEdit({ ...edit, start: e.target.value })} /></Field>
                <Field label="Target end date"><input style={inputStyle} type="date" value={edit.end} onChange={(e) => setEdit({ ...edit, end: e.target.value })} /></Field>
              </div>
              <div style={{ display: "flex", gap: 8, marginTop: 4 }}>
                <Btn onClick={() => saveEdit(j.id)} style={{ flex: 1 }}>Save changes</Btn>
                <Btn kind="ghost" onClick={() => setEditId(null)}>Cancel</Btn>
              </div>
              <button
                onClick={() => deleteJob(j.id)}
                style={{ width: "100%", marginTop: 10, background: confirmDel === j.id ? T.out : "transparent", color: confirmDel === j.id ? "#fff" : T.out, border: `1.5px solid ${T.out}`, borderRadius: 10, padding: "11px", cursor: "pointer", fontFamily: font.display, fontWeight: 700, fontSize: 14 }}
              >
                {confirmDel === j.id ? "Tap again to delete this job" : "Delete job"}
              </button>
              {confirmDel === j.id && (
                <div style={{ fontSize: 12, color: T.sub, marginTop: 6 }}>
                  Crew and schedule will be freed up. Logged hours and this job's expense entries are removed.
                </div>
              )}
            </Card>
          );
        }

        return (
          <Card key={j.id} id={`job-${j.id}`} style={{ opacity: j.status === "done" ? 0.7 : 1 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
              <div style={{ fontFamily: font.display, fontWeight: 700, fontSize: 19 }}>{j.name}</div>
              <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                <button onClick={() => toggleStatus(j.id)} style={{ background: j.status === "active" ? T.hivisSoft : T.inkSoft, color: j.status === "active" ? T.hivis : T.sub, border: "none", borderRadius: 8, fontFamily: font.display, fontWeight: 700, fontSize: 12, padding: "4px 10px", cursor: "pointer", textTransform: "uppercase" }}>
                  {j.status}
                </button>
                <button onClick={() => startEdit(j)} style={{ background: T.inkSoft, color: T.ink, border: "none", borderRadius: 8, fontFamily: font.display, fontWeight: 700, fontSize: 12, padding: "4px 10px", cursor: "pointer" }}>
                  Edit
                </button>
              </div>
            </div>
            <div style={{ fontSize: 12, color: T.sub, marginBottom: 6 }}>
              {j.client}{guys.length ? ` · crew: ${guys.join(", ")}` : " · no crew assigned"}
            </div>
            {j.address && (
              <div style={{ fontSize: 13, marginBottom: 8 }}>
                <MapsLink address={j.address} />
              </div>
            )}
            {(j.start || j.end) && (
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
                <span style={{ fontFamily: font.display, fontWeight: 600, fontSize: 12, color: T.ink, background: T.inkSoft, borderRadius: 6, padding: "3px 8px" }}>
                  {fmtRange(j.start, j.end)}
                </span>
                {j.status === "active" && dl !== null && (
                  <span style={{ fontSize: 12, fontWeight: 700, color: dl < 0 ? T.out : dl <= 3 ? T.hivis : T.sub }}>
                    {dl < 0 ? `${-dl}d overdue` : dl === 0 ? "due today" : `${dl}d left`}
                  </span>
                )}
              </div>
            )}
            <div style={{ height: 12, background: T.inkSoft, borderRadius: 6, overflow: "hidden", marginBottom: 8 }}>
              <div style={{ width: `${pct}%`, height: "100%", background: pct > 85 ? T.out : pct > 60 ? T.hivis : T.in }} />
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, fontVariantNumeric: "tabular-nums" }}>
              <span style={{ color: T.sub }}>Billed <b style={{ color: T.ink }}>{fmt(billed)}</b></span>
              <span style={{ color: T.sub }}>Cost <b style={{ color: T.ink }}>{fmt(cost)}</b></span>
            </div>
            {billed > 0 && (
              <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
                <div style={{ flex: 1, border: `1px solid ${T.line}`, borderRadius: 10, padding: "8px 10px" }}>
                  <div style={{ fontSize: 10, letterSpacing: ".06em", textTransform: "uppercase", color: T.sub, fontWeight: 700 }}>Gross margin</div>
                  <div style={{ fontFamily: font.num, fontWeight: 800, fontSize: 17, color: gross >= 0 ? T.in : T.out }}>{fmt(gross)}</div>
                  <div style={{ fontSize: 12, fontWeight: 700, color: gross >= 0 ? T.in : T.out }}>{grossPct.toFixed(1)}%</div>
                </div>
                <div style={{ flex: 1, border: `1px solid ${T.line}`, borderRadius: 10, padding: "8px 10px" }}>
                  <div style={{ fontSize: 10, letterSpacing: ".06em", textTransform: "uppercase", color: T.sub, fontWeight: 700 }}>Net margin</div>
                  <div style={{ fontFamily: font.num, fontWeight: 800, fontSize: 17, color: net >= 0 ? T.in : T.out }}>{fmt(net)}</div>
                  <div style={{ fontSize: 12, fontWeight: 700, color: net >= 0 ? T.in : T.out }}>{netPct.toFixed(1)}%</div>
                </div>
              </div>
            )}
            {billed === 0 && (
              <div style={{ fontSize: 12, color: T.hivis, fontWeight: 600, marginTop: 6 }}>Set a contract amount (Edit) to see margins.</div>
            )}
            <div style={{ fontSize: 12, color: T.sub, marginTop: 6 }}>
              Labor {fmt(labor)} · materials {fmt(materials)} · subs {fmt(subsTotal)} · overhead {fmt(overhead)}{coCost || coBilled ? ` · changes +${fmt(coBilled)}/−${fmt(coCost)}` : ""}
            </div>

            {(() => {
              const jobEntries = (data.timeEntries || []).filter((e) => e.jobId === j.id);
              if (jobEntries.length === 0) return null;
              const rateOf = (cid) => { const c = data.crew.find((x) => x.id === cid); return c ? c.rate || 0 : 0; };
              const nameOf = (cid) => { const c = data.crew.find((x) => x.id === cid); return c ? c.name : "—"; };
              const crewCount = new Set(jobEntries.map((e) => e.crewId)).size;
              // group by week, then crew
              const wm = {};
              jobEntries.forEach((e) => {
                const ws = weekStartOf(e.date);
                const w = (wm[ws] = wm[ws] || { hours: 0, cost: 0, crew: {} });
                w.hours += e.hours; w.cost += e.hours * rateOf(e.crewId);
                w.crew[e.crewId] = (w.crew[e.crewId] || 0) + e.hours;
              });
              const weeks = Object.entries(wm).map(([ws, v]) => ({
                ws, hours: v.hours, cost: v.cost,
                crew: Object.entries(v.crew).map(([cid, h]) => ({ cid, name: nameOf(cid), hours: h, cost: h * rateOf(cid) })).sort((a, b) => b.hours - a.hours),
              })).sort((a, b) => b.ws.localeCompare(a.ws));
              const r1 = (x) => Math.round(x * 10) / 10;
              return (
                <div style={{ marginTop: 8 }}>
                  <button onClick={() => setCrewOpen(crewOpen === j.id ? null : j.id)}
                    style={{ background: "none", border: "none", color: T.hivis, cursor: "pointer", fontFamily: font.display, fontWeight: 700, fontSize: 13, padding: 0 }}>
                    {crewOpen === j.id ? "Hide crew hours" : `Who worked here · ${crewCount} ▸`}
                  </button>
                  {crewOpen === j.id && (
                    <div style={{ marginTop: 8 }}>
                      {weeks.map((w) => (
                        <div key={w.ws} style={{ padding: "9px 0", borderBottom: `1px solid ${T.line}` }}>
                          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 4 }}>
                            <span style={{ fontFamily: font.display, fontWeight: 700, fontSize: 13 }}>{shortDate(w.ws)}–{shortDate(addDays(w.ws, 6))}</span>
                            <span style={{ fontFamily: font.num, fontWeight: 800, fontSize: 14 }}>{r1(w.hours)}h <span style={{ color: T.sub, fontWeight: 600, fontSize: 12 }}>· {fmt(w.cost)}</span></span>
                          </div>
                          {w.crew.map((r) => (
                            <div key={r.cid} style={{ display: "flex", justifyContent: "space-between", fontSize: 13, padding: "2px 0" }}>
                              <span style={{ color: T.ink }}>{r.name}</span>
                              <span style={{ fontFamily: font.num, color: T.sub }}>{r1(r.hours)}h · {fmt(r.cost)}</span>
                            </div>
                          ))}
                        </div>
                      ))}
                      <div style={{ display: "flex", justifyContent: "space-between", paddingTop: 7, fontSize: 13 }}>
                        <span style={{ color: T.sub, fontWeight: 700 }}>Total</span>
                        <span style={{ fontFamily: font.num, fontWeight: 800 }}>{r1(jobEntries.reduce((s, e) => s + e.hours, 0))}h · {fmt(labor)}</span>
                      </div>
                    </div>
                  )}
                </div>
              );
            })()}

            <div style={{ marginTop: 10, borderTop: `1px solid ${T.line}`, paddingTop: 10 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <Eyebrow>Job expenses</Eyebrow>
                <button onClick={() => setExpOpen(expOpen === j.id ? null : j.id)} style={{ background: "none", border: "none", color: T.hivis, cursor: "pointer", fontFamily: font.display, fontWeight: 700, fontSize: 13 }}>
                  {expOpen === j.id ? "Close" : "+ Add expense"}
                </button>
              </div>
              {(j.expenses || []).map((x) => (
                <div key={x.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 0", fontSize: 13 }}>
                  {x.photo
                    ? <img src={x.photo} onClick={() => setViewPhoto(x.photo)} alt="receipt" style={{ width: 34, height: 34, objectFit: "cover", borderRadius: 6, cursor: "pointer", flex: "0 0 auto", border: `1px solid ${T.line}` }} />
                    : <span style={{ width: 34, flex: "0 0 auto" }} />}
                  <span style={{ flex: 1, color: T.ink }}>{x.label}<span style={{ color: T.sub }}> · {x.date.slice(5)}</span></span>
                  <span style={{ fontFamily: font.num, fontWeight: 700, color: T.out, fontVariantNumeric: "tabular-nums" }}>{fmt(x.amount)}</span>
                  <button onClick={() => removeExpense(j.id, x.id)} style={{ background: "none", border: "none", color: T.sub, fontSize: 16, cursor: "pointer", padding: 2 }} aria-label="Remove">×</button>
                </div>
              ))}
              {(j.expenses || []).length === 0 && expOpen !== j.id && (
                <div style={{ fontSize: 12, color: T.sub, marginTop: 4 }}>No materials or subs logged yet.</div>
              )}
              {expOpen === j.id && (
                <div style={{ marginTop: 8 }}>
                  <div style={{ display: "flex", gap: 6 }}>
                    <input style={{ ...inputStyle, flex: 1.4 }} placeholder="What" value={(expForm[j.id]?.label) || ""} onChange={(e) => setExpForm({ ...expForm, [j.id]: { ...expForm[j.id], label: e.target.value } })} />
                    <input style={{ ...inputStyle, flex: 1 }} type="number" inputMode="decimal" placeholder="$" value={(expForm[j.id]?.amount) || ""} onChange={(e) => setExpForm({ ...expForm, [j.id]: { ...expForm[j.id], amount: e.target.value } })} />
                    <Btn small onClick={() => addExpense(j.id)}>Add</Btn>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 10, marginTop: 8 }}>
                    <label style={{ display: "inline-flex", alignItems: "center", gap: 6, background: T.hivisSoft, color: T.hivis, border: `1.5px solid ${T.hivis}`, borderRadius: 10, padding: "8px 12px", cursor: "pointer", fontFamily: font.display, fontWeight: 700, fontSize: 13 }}>
                      📷 {expForm[j.id]?.photo ? "Retake" : "Attach receipt"}
                      <input type="file" accept="image/*" capture="environment" style={{ display: "none" }}
                        onChange={(e) => { attachPhoto(j.id, e.target.files[0]); e.target.value = ""; }} />
                    </label>
                    {photoBusy === j.id && <span style={{ fontSize: 12, color: T.sub }}>Processing photo…</span>}
                    {expForm[j.id]?.photo && (
                      <>
                        <img src={expForm[j.id].photo} onClick={() => setViewPhoto(expForm[j.id].photo)} alt="receipt preview" style={{ width: 40, height: 40, objectFit: "cover", borderRadius: 6, cursor: "pointer", border: `1px solid ${T.line}` }} />
                        <button onClick={() => setExpForm({ ...expForm, [j.id]: { ...expForm[j.id], photo: "" } })} style={{ background: "none", border: "none", color: T.out, fontSize: 13, cursor: "pointer", fontWeight: 700 }}>Remove</button>
                      </>
                    )}
                  </div>
                </div>
              )}
            </div>

            <div style={{ marginTop: 10, borderTop: `1px solid ${T.line}`, paddingTop: 10 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <Eyebrow color={T.hivis}>Scope changes / change orders</Eyebrow>
                <button onClick={() => setCoOpen(coOpen === j.id ? null : j.id)} style={{ background: "none", border: "none", color: T.hivis, cursor: "pointer", fontFamily: font.display, fontWeight: 700, fontSize: 13 }}>
                  {coOpen === j.id ? "Close" : "+ Add change"}
                </button>
              </div>
              {(j.changes || []).map((x) => (
                <div key={x.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 0", fontSize: 13 }}>
                  <span style={{ flex: 1, color: T.ink }}>{x.label}<span style={{ color: T.sub }}> · {x.date.slice(5)}</span></span>
                  <span style={{ fontFamily: font.num, fontWeight: 700, color: T.in, fontVariantNumeric: "tabular-nums" }} title="billed to client">+{fmt(x.billed)}</span>
                  <span style={{ fontFamily: font.num, fontWeight: 700, color: T.out, fontVariantNumeric: "tabular-nums" }} title="added cost">−{fmt(x.cost)}</span>
                  <button onClick={() => removeChange(j.id, x.id)} style={{ background: "none", border: "none", color: T.sub, fontSize: 16, cursor: "pointer", padding: 2 }} aria-label="Remove">×</button>
                </div>
              ))}
              {(j.changes || []).length === 0 && coOpen !== j.id && (
                <div style={{ fontSize: 12, color: T.sub, marginTop: 4 }}>No change orders logged.</div>
              )}
              {coOpen === j.id && (
                <div style={{ marginTop: 8 }}>
                  <input style={{ ...inputStyle, marginBottom: 6 }} placeholder="What changed (e.g. added bathroom door)" value={(coForm[j.id]?.label) || ""} onChange={(e) => setCoForm({ ...coForm, [j.id]: { ...coForm[j.id], label: e.target.value } })} />
                  <div style={{ display: "flex", gap: 6 }}>
                    <input style={{ ...inputStyle, flex: 1 }} type="number" inputMode="decimal" placeholder="Bill client $" value={(coForm[j.id]?.billed) || ""} onChange={(e) => setCoForm({ ...coForm, [j.id]: { ...coForm[j.id], billed: e.target.value } })} />
                    <input style={{ ...inputStyle, flex: 1 }} type="number" inputMode="decimal" placeholder="Added cost $" value={(coForm[j.id]?.cost) || ""} onChange={(e) => setCoForm({ ...coForm, [j.id]: { ...coForm[j.id], cost: e.target.value } })} />
                    <Btn small onClick={() => addChange(j.id)}>Add</Btn>

}
