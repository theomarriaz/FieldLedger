function ManageCrew({ data, save }) {
  const [adding, setAdding] = useState(false);
  const [form, setForm] = useState({ name: "", rate: "", casual: false });
  const [editId, setEditId] = useState(null);
  const [edit, setEdit] = useState({ name: "", rate: "", casual: false, active: true });
  const [confirmDel, setConfirmDel] = useState(null);

  const add = () => {
    if (!form.name || !form.rate) return;
    save({ ...data, crew: [...data.crew, { id: uid(), name: form.name.trim(), rate: parseFloat(form.rate), casual: form.casual, active: true, jobId: null }], seeded: false });
    setForm({ name: "", rate: "", casual: false });
    setAdding(false);
  };
  const startEdit = (c) => { setEditId(c.id); setEdit({ name: c.name, rate: String(c.rate), casual: !!c.casual, active: c.active !== false }); setConfirmDel(null); };
  const saveEdit = (id) => {
    if (!edit.name || isNaN(parseFloat(edit.rate))) return;
    save({ ...data, crew: data.crew.map((c) => (c.id === id ? { ...c, name: edit.name.trim(), rate: parseFloat(edit.rate), casual: edit.casual, active: edit.active } : c)), seeded: false });
    setEditId(null);
  };
  const del = (id) => {
    if (confirmDel !== id) { setConfirmDel(id); setTimeout(() => setConfirmDel((x) => (x === id ? null : x)), 3500); return; }
    save({
      ...data,
      crew: data.crew.filter((c) => c.id !== id),
      schedule: (data.schedule || []).filter((s) => s.crewId !== id),
      timeEntries: data.timeEntries.filter((e) => e.crewId !== id),
      seeded: false,
    });
    setConfirmDel(null); setEditId(null);
  };

  const sorted = [...data.crew].sort((a, b) => (a.active !== false) === (b.active !== false) ? a.name.localeCompare(b.name) : (a.active !== false ? -1 : 1));
  const activeN = data.crew.filter((c) => c.active !== false).length;

  const TypePick = ({ casual, set }) => (
    <div style={{ marginBottom: 10 }}>
      <div style={{ fontSize: 12, fontWeight: 600, color: T.sub, marginBottom: 4 }}>Employment type</div>
      <div style={{ display: "flex", gap: 8 }}>
        {[{ v: false, label: "Permanent" }, { v: true, label: "Casual (as-needed)" }].map((o) => (
          <button key={String(o.v)} onClick={() => set(o.v)}
            style={{ flex: 1, padding: "9px 0", borderRadius: 10, cursor: "pointer", fontFamily: font.display, fontWeight: 700, fontSize: 13,
              border: `1.5px solid ${casual === o.v ? (o.v ? T.hivis : T.ink) : T.line}`,
              background: casual === o.v ? (o.v ? T.hivis : T.ink) : "#fff",
              color: casual === o.v ? "#fff" : T.sub }}>
            {o.label}
          </button>
        ))}
      </div>
    </div>
  );

  const Toggle = ({ on, set, label }) => (
    <label style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 14, color: T.ink, marginBottom: 10, cursor: "pointer" }}>
      <input type="checkbox" checked={on} onChange={(e) => set(e.target.checked)} style={{ width: 18, height: 18 }} />
      {label}
    </label>
  );

  return (
    <>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <Eyebrow>Crew · {activeN} active / {data.crew.length} total</Eyebrow>
        <Btn small onClick={() => setAdding(!adding)}>{adding ? "Close" : "+ Add crew"}</Btn>
      </div>

      {(() => {
        const flags = data.crew.map((c) => ({ c, ...classifyReview(c, data.timeEntries) })).filter((x) => x.suggestion);
        if (flags.length === 0) return null;
        const apply = (id, makeCasual) => save({ ...data, crew: data.crew.map((c) => (c.id === id ? { ...c, casual: makeCasual } : c)), seeded: false });
        return (
          <Card style={{ borderLeft: `4px solid ${T.hivis}`, background: T.hivisSoft }}>
            <Eyebrow color={T.hivis}>Flagged for review · {flags.length}</Eyebrow>
            <div style={{ fontSize: 12, color: T.sub, margin: "4px 0 8px" }}>Recent hours don't match the set type. Review and apply if you agree.</div>
            {flags.map(({ c, suggestion, reason }) => (
              <div key={c.id} style={{ padding: "8px 0", borderTop: `1px solid ${T.line}` }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
                  <span style={{ fontFamily: font.display, fontWeight: 700, fontSize: 15 }}>{c.name}</span>
                  <span style={{ fontSize: 12, color: T.sub }}>{c.casual ? "Casual" : "Permanent"} → <b style={{ color: T.ink }}>{suggestion === "casual" ? "Casual" : "Permanent"}</b></span>
                </div>
                <div style={{ fontSize: 12, color: T.sub, marginTop: 2 }}>{reason}</div>
                <div style={{ display: "flex", gap: 8, marginTop: 6 }}>
                  <Btn small onClick={() => apply(c.id, suggestion === "casual")}>Set {suggestion === "casual" ? "casual" : "permanent"}</Btn>
                </div>
              </div>
            ))}
          </Card>
        );
      })()}
      {adding && (
        <Card>
          <Field label="Name"><input style={inputStyle} value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })} placeholder="First name" /></Field>
          <Field label="Cost rate ($/hr)"><input style={inputStyle} type="number" inputMode="decimal" value={form.rate} onChange={(e) => setForm({ ...form, rate: e.target.value })} placeholder="55" /></Field>
          <TypePick casual={form.casual} set={(v) => setForm({ ...form, casual: v })} />
          <Btn onClick={add} style={{ width: "100%" }}>Add to crew</Btn>
        </Card>
      )}
      {sorted.map((c) => editId === c.id ? (
        <Card key={c.id} style={{ borderLeft: `4px solid ${T.ink}` }}>
          <Field label="Name"><input style={inputStyle} value={edit.name} onChange={(e) => setEdit({ ...edit, name: e.target.value })} /></Field>
          <Field label="Cost rate ($/hr)"><input style={inputStyle} type="number" inputMode="decimal" value={edit.rate} onChange={(e) => setEdit({ ...edit, rate: e.target.value })} /></Field>
          <TypePick casual={edit.casual} set={(v) => setEdit({ ...edit, casual: v })} />
          <Toggle on={edit.active} set={(v) => setEdit({ ...edit, active: v })} label="Active (currently employed)" />
          <div style={{ display: "flex", gap: 8 }}>
            <Btn onClick={() => saveEdit(c.id)} style={{ flex: 1 }}>Save</Btn>
            <Btn kind="ghost" onClick={() => setEditId(null)}>Cancel</Btn>
          </div>
          <button onClick={() => del(c.id)}
            style={{ width: "100%", marginTop: 10, background: confirmDel === c.id ? T.out : "transparent", color: confirmDel === c.id ? "#fff" : T.out, border: `1.5px solid ${T.out}`, borderRadius: 10, padding: "11px", cursor: "pointer", fontFamily: font.display, fontWeight: 700, fontSize: 14 }}>
            {confirmDel === c.id ? "Tap again to delete" : "Delete crew member"}
          </button>
          {confirmDel === c.id && <div style={{ fontSize: 12, color: T.sub, marginTop: 6 }}>Deleting also removes their logged hours from job costing. To keep history, mark them inactive instead.</div>}
        </Card>
      ) : (
        <Card key={c.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", opacity: c.active === false ? 0.6 : 1, borderLeft: c.active === false ? `4px solid ${T.line}` : "none" }}>
          <div>
            <div style={{ fontFamily: font.display, fontWeight: 700, fontSize: 18, display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
              {c.name}
              {c.casual && <span style={{ background: T.hivisSoft, color: T.hivis, borderRadius: 6, padding: "2px 7px", fontSize: 11, fontWeight: 700 }}>CASUAL</span>}
              {c.contractor && <span style={{ background: "#E8EEF5", color: T.navy || "#1B2A41", borderRadius: 6, padding: "2px 7px", fontSize: 11, fontWeight: 700 }}>CONTRACTOR</span>}
              {c.active === false && <span style={{ background: T.inkSoft, color: T.sub, borderRadius: 6, padding: "2px 7px", fontSize: 11, fontWeight: 700 }}>INACTIVE</span>}
            </div>
            <div style={{ fontSize: 13, color: T.sub }}>${c.rate}/hr</div>
          </div>
          <Btn small kind="ghost" onClick={() => startEdit(c)}>Edit</Btn>
        </Card>
      ))}
    </>
  );
}

// ---------- TASK TRACKER ----------
function TaskTracker({ data, save }) {
  const tasks = data.tasks || [];
  const [adding, setAdding] = useState(false);
  const [form, setForm] = useState({ title: "", assignedBy: "", assignedTo: "", notes: "", assignedDate: todayStr(), deadline: "" });
  const [editId, setEditId] = useState(null);
  const [edit, setEdit] = useState({});
  const [confirmDel, setConfirmDel] = useState(null);
  const [filter, setFilter] = useState("all"); // all | late | 24h | 7d

  const dl = (deadline) => {
    if (!deadline) return null;
    return Math.round((new Date(deadline + "T00:00:00") - new Date(todayStr() + "T00:00:00")) / 86400000);
  };

  const open = tasks.filter((t) => t.status !== "done");
  const lateN = open.filter((t) => { const d = dl(t.deadline); return d !== null && d < 0; }).length;
  const dueTodayN = open.filter((t) => dl(t.deadline) === 0).length;
  const next24N = open.filter((t) => { const d = dl(t.deadline); return d !== null && d >= 0 && d <= 1; }).length;
  const next7N = open.filter((t) => { const d = dl(t.deadline); return d !== null && d >= 0 && d <= 7; }).length;

  const addTask = () => {
    if (!form.title) return;
    save({
      ...data,
      tasks: [...tasks, { id: uid(), title: form.title.trim(), assignedBy: form.assignedBy.trim(), assignedTo: form.assignedTo || "", notes: form.notes.trim(), assignedDate: form.assignedDate || todayStr(), deadline: form.deadline || "", status: "open" }],
      seeded: false,
    });
    setForm({ title: "", assignedBy: "", assignedTo: "", notes: "", assignedDate: todayStr(), deadline: "" });
    setAdding(false);
  };

  const startEdit = (t) => { setEditId(t.id); setEdit({ title: t.title, assignedBy: t.assignedBy || "", assignedTo: t.assignedTo || "", notes: t.notes || "", assignedDate: t.assignedDate || todayStr(), deadline: t.deadline || "" }); setConfirmDel(null); };
  const saveEdit = (id) => {
    if (!edit.title) return;
    save({ ...data, tasks: tasks.map((t) => (t.id === id ? { ...t, title: edit.title.trim(), assignedBy: edit.assignedBy.trim(), assignedTo: edit.assignedTo, notes: edit.notes.trim(), assignedDate: edit.assignedDate || "", deadline: edit.deadline || "" } : t)), seeded: false });
    setEditId(null);
  };

  const toggleDone = (t) =>
    save({ ...data, tasks: tasks.map((x) => (x.id === t.id ? { ...x, status: x.status === "done" ? "open" : "done" } : x)), seeded: false });

  const del = (id) => {
    if (confirmDel !== id) { setConfirmDel(id); setTimeout(() => setConfirmDel((x) => (x === id ? null : x)), 3000); return; }
    save({ ...data, tasks: tasks.filter((t) => t.id !== id), seeded: false });
    setConfirmDel(null);
  };

  const matchFilter = (t) => {
    if (t.status === "done") return filter === "all";
    const d = dl(t.deadline);
    if (filter === "late") return d !== null && d < 0;
    if (filter === "24h") return d !== null && d >= 0 && d <= 1;
    if (filter === "7d") return d !== null && d >= 0 && d <= 7;
    return true;
  };
  const sorted = [...tasks].filter(matchFilter).sort((a, b) => {
    if ((a.status === "done") !== (b.status === "done")) return a.status === "done" ? 1 : -1;
    return (a.deadline || "9999").localeCompare(b.deadline || "9999");
  });

  const taskForm = (st, setSt) => (
    <>
      <Field label="Task"><input style={inputStyle} value={st.title} onChange={(e) => setSt({ ...st, title: e.target.value })} placeholder="Install hallway panels" /></Field>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
        <Field label="Assigned by"><input style={inputStyle} value={st.assignedBy} onChange={(e) => setSt({ ...st, assignedBy: e.target.value })} placeholder="Name" /></Field>
        <Field label="Assigned to">
          <select style={inputStyle} value={st.assignedTo} onChange={(e) => setSt({ ...st, assignedTo: e.target.value })}>
            <option value="">Unassigned</option>
            {data.crew.filter(isActiveCrew).map((c) => <option key={c.id} value={c.id}>{c.name}</option>)}
          </select>
        </Field>
      </div>
      <Field label="Related info / notes"><textarea style={{ ...inputStyle, minHeight: 64, fontFamily: font.body, resize: "vertical" }} value={st.notes} onChange={(e) => setSt({ ...st, notes: e.target.value })} placeholder="Materials, location, special instructions…" /></Field>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
        <Field label="Assigned date"><input style={inputStyle} type="date" value={st.assignedDate} onChange={(e) => setSt({ ...st, assignedDate: e.target.value })} /></Field>
        <Field label="Deadline"><input style={inputStyle} type="date" value={st.deadline} onChange={(e) => setSt({ ...st, deadline: e.target.value })} /></Field>
      </div>
    </>
  );

  const Metric = ({ label, n, color, id }) => (
    <button onClick={() => setFilter(filter === id ? "all" : id)}
      style={{ flex: 1, background: filter === id ? color : "#fff", border: `1.5px solid ${color}`, borderRadius: 12, padding: "10px 6px", cursor: "pointer", textAlign: "center" }}>
      <div style={{ fontFamily: font.num, fontWeight: 800, fontSize: 24, color: filter === id ? "#fff" : color, lineHeight: 1 }}>{n}</div>
      <div style={{ fontFamily: font.display, fontWeight: 700, fontSize: 10, letterSpacing: "0.04em", textTransform: "uppercase", color: filter === id ? "#fff" : T.sub, marginTop: 3 }}>{label}</div>
    </button>
  );

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <Eyebrow>Task Tracker · {open.length} open</Eyebrow>
        <Btn small onClick={() => { setAdding(!adding); setEditId(null); }}>{adding ? "Close" : "+ Add task"}</Btn>
      </div>

      {/* Report: due / late / upcoming */}
      <div style={{ display: "flex", gap: 8 }}>
        <Metric label="Late" n={lateN} color={T.out} id="late" />
        <Metric label="Due today" n={dueTodayN} color={T.hivis} id="today" />
        <Metric label="≤ 24h" n={next24N} color={T.hivis} id="24h" />
        <Metric label="≤ 7 days" n={next7N} color={T.in} id="7d" />
      </div>
      {filter !== "all" && (
        <button onClick={() => setFilter("all")} style={{ alignSelf: "flex-start", background: "none", border: "none", color: T.sub, fontFamily: font.display, fontWeight: 700, fontSize: 12, cursor: "pointer" }}>
          ✕ Clear filter — showing {filter === "late" ? "late" : filter === "24h" ? "next 24h" : filter === "7d" ? "next 7 days" : "due today"}
        </button>
      )}

      {adding && <Card>{taskForm(form, setForm)}<Btn onClick={addTask} style={{ width: "100%" }}>Add task</Btn></Card>}

      {sorted.length === 0 && <Card><div style={{ fontSize: 14, color: T.sub, textAlign: "center", padding: 12 }}>No tasks here.</div></Card>}

      {sorted.map((t) => {
        if (editId === t.id) {
          return (
            <Card key={t.id} style={{ borderLeft: `4px solid ${T.ink}` }}>
              {taskForm(edit, setEdit)}
              <div style={{ display: "flex", gap: 8 }}>
                <Btn onClick={() => saveEdit(t.id)} style={{ flex: 1 }}>Save</Btn>
                <Btn kind="ghost" onClick={() => setEditId(null)}>Cancel</Btn>
              </div>
              <button onClick={() => del(t.id)} style={{ width: "100%", marginTop: 10, background: confirmDel === t.id ? T.out : "transparent", color: confirmDel === t.id ? "#fff" : T.out, border: `1.5px solid ${T.out}`, borderRadius: 10, padding: "11px", cursor: "pointer", fontFamily: font.display, fontWeight: 700, fontSize: 14 }}>
                {confirmDel === t.id ? "Tap again to delete" : "Delete task"}
              </button>
            </Card>
          );
        }
        const who = data.crew.find((c) => c.id === t.assignedTo);
        const d = dl(t.deadline);
        const done = t.status === "done";
        const edge = done ? T.line : d !== null && d < 0 ? T.out : d !== null && d <= 1 ? T.hivis : T.in;
        return (
          <Card key={t.id} style={{ borderLeft: `4px solid ${edge}`, opacity: done ? 0.6 : 1 }}>
            <div style={{ display: "flex", alignItems: "flex-start", gap: 10 }}>
              <button onClick={() => toggleDone(t)} aria-label="Toggle done"
                style={{ flex: "0 0 auto", width: 24, height: 24, borderRadius: 7, cursor: "pointer", marginTop: 2,
                  border: `2px solid ${done ? T.in : T.line}`, background: done ? T.in : "#fff", color: "#fff", fontSize: 15, lineHeight: 1, fontWeight: 800 }}>
                {done ? "✓" : ""}
              </button>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontFamily: font.display, fontWeight: 700, fontSize: 16, textDecoration: done ? "line-through" : "none" }}>{t.title}</div>
                <div style={{ fontSize: 12, color: T.sub, marginTop: 2 }}>
                  {who ? who.name : "Unassigned"}{t.assignedBy ? ` · by ${t.assignedBy}` : ""}
                </div>
                {t.notes && <div style={{ fontSize: 13, color: T.ink, marginTop: 6, whiteSpace: "pre-wrap" }}>{t.notes}</div>}
                <div style={{ display: "flex", gap: 10, flexWrap: "wrap", fontSize: 12, marginTop: 6 }}>
                  {t.assignedDate && <span style={{ color: T.sub }}>Assigned {shortDate(t.assignedDate)}</span>}
                  {t.deadline && (
                    <span style={{ fontWeight: 700, color: done ? T.sub : d < 0 ? T.out : d <= 2 ? T.hivis : T.in }}>
                      {done ? `due ${shortDate(t.deadline)}` : d < 0 ? `${-d}d late · ${shortDate(t.deadline)}` : d === 0 ? "due today" : `due in ${d}d · ${shortDate(t.deadline)}`}
                    </span>
                  )}
                </div>
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 6, alignItems: "flex-end" }}>
                <button onClick={() => startEdit(t)} style={{ background: T.inkSoft, border: "none", color: T.ink, borderRadius: 8, padding: "5px 10px", cursor: "pointer", fontFamily: font.display, fontWeight: 700, fontSize: 12 }}>Edit</button>
                <button onClick={() => del(t.id)} style={{ background: confirmDel === t.id ? T.out : "none", color: confirmDel === t.id ? "#fff" : T.sub, border: "none", borderRadius: 8, fontSize: confirmDel === t.id ? 11 : 18, cursor: "pointer", padding: confirmDel === t.id ? "5px 8px" : "0 4px", fontFamily: font.display, fontWeight: 700 }}>
                  {confirmDel === t.id ? "Sure?" : "×"}
                </button>
              </div>
            </div>
          </Card>
        );
      })}
    </div>
  );
}

// ---------- HOURS REPORT (by crew, by week) ----------
const weekStartOf = (ds) => {
  const d = new Date(ds + "T00:00:00");
  d.setDate(d.getDate() - d.getDay()); // back up to Sunday
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
};

function HoursReport({ data }) {
  const [view, setView] = useState("week"); // "week" | "trend"
  const [empId, setEmpId] = useState(null);  // selected employee drill-down
  const [trendWin, setTrendWin] = useState(4); // 4 or 13 weeks
  const [wkStart, setWkStart] = useState(weekStartOf(todayStr()));
  const [mode, setMode] = useState("crew");
  const end = addDays(wkStart, 6);

  const hoursInRange = (s, e) => (data.timeEntries || []).filter((x) => x.date >= s && x.date <= e).reduce((a, x) => a + x.hours, 0);
  const rateById = (id) => { const c = data.crew.find((x) => x.id === id); return c ? c.rate || 0 : 0; };
  const costInRange = (s, e) => (data.timeEntries || []).filter((x) => x.date >= s && x.date <= e).reduce((a, x) => a + x.hours * rateById(x.crewId), 0);
  const thisWeekStart = weekStartOf(todayStr());
  // Build trailing weekly totals (oldest -> newest), newest = current week
  const buildWeeks = (n) => Array.from({ length: n }, (_, i) => {
    const ws = addDays(thisWeekStart, -(n - 1 - i) * 7);
    return { start: ws, total: hoursInRange(ws, addDays(ws, 6)), cost: costInRange(ws, addDays(ws, 6)) };
  });
  const trendWeeks = buildWeeks(trendWin);
  const wk = (k) => hoursInRange(addDays(thisWeekStart, -k * 7), addDays(thisWeekStart, -k * 7 + 6));
  const lastWeekTotal = wk(1); // the completed week before this one
  const avg4 = [1, 2, 3, 4].reduce((a, k) => a + wk(k), 0) / 4;
  const avg13 = Array.from({ length: 13 }, (_, i) => wk(i + 1)).reduce((a, b) => a + b, 0) / 13;

  const inWeek = (data.timeEntries || []).filter((e) => e.date >= wkStart && e.date <= end);
  const totalH = inWeek.reduce((s, e) => s + e.hours, 0);
  const totalCost = inWeek.reduce((s, e) => {
    const c = data.crew.find((x) => x.id === e.crewId);
    return s + e.hours * (c ? c.rate || 0 : 0);
  }, 0);

  const byCrew = (data.crew || []).map((c) => {
    const es = inWeek.filter((e) => e.crewId === c.id);
    const hours = es.reduce((s, e) => s + e.hours, 0);
    return { id: c.id, name: c.name + (c.active === false ? " (inactive)" : "") + (c.casual ? " (casual)" : ""), hours, days: new Set(es.map((e) => e.date)).size, cost: hours * (c.rate || 0), core: isCoreCrew(c) };
  });
  const workedCrew = byCrew.filter((x) => x.hours > 0).sort(byName);
  const idleCrew = byCrew.filter((x) => x.hours === 0 && x.core);

  const byJob = (data.jobs || []).map((j) => {
    const es = inWeek.filter((e) => e.jobId === j.id);
    return { id: j.id, name: j.name, hours: es.reduce((s, e) => s + e.hours, 0) };
  }).filter((x) => x.hours > 0).sort(byName);

  const rows = mode === "crew" ? workedCrew : byJob;
  const maxH = Math.max(1, ...rows.map((r) => r.hours));
  const isThisWeek = wkStart === weekStartOf(todayStr());

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
      {empId && <EmployeeDetail data={data} crewId={empId} setCrewId={setEmpId} onBack={() => setEmpId(null)} />}
      {!empId && (<>
      {/* View toggle */}
      <div style={{ display: "flex", gap: 6, background: T.inkSoft, padding: 4, borderRadius: 12 }}>
        {[{ id: "week", label: "Weekly breakdown" }, { id: "trend", label: "Trend" }].map((v) => (
          <button key={v.id} onClick={() => setView(v.id)}
            style={{ flex: 1, padding: "9px 0", borderRadius: 9, border: "none", cursor: "pointer", fontFamily: font.display, fontWeight: 700, fontSize: 14,
              background: view === v.id ? "#fff" : "transparent", color: view === v.id ? T.ink : T.sub, boxShadow: view === v.id ? "0 1px 3px rgba(0,0,0,.12)" : "none" }}>
            {v.label}
          </button>
        ))}
      </div>

      {view === "trend" && (() => {
        const maxH = Math.max(1, ...trendWeeks.map((w) => w.total));
        const lwVs4 = avg4 > 0 ? Math.round(((lastWeekTotal - avg4) / avg4) * 100) : 0;
        const lwVs13 = avg13 > 0 ? Math.round(((lastWeekTotal - avg13) / avg13) * 100) : 0;
        return (
          <>
            {/* Window toggle */}
            <div style={{ display: "flex", gap: 8 }}>
              {[4, 13].map((n) => (
                <button key={n} onClick={() => setTrendWin(n)}
                  style={{ flex: 1, padding: "8px 0", borderRadius: 10, cursor: "pointer", fontFamily: font.display, fontWeight: 700, fontSize: 13,
                    border: `1.5px solid ${trendWin === n ? T.ink : T.line}`, background: trendWin === n ? T.ink : "#fff", color: trendWin === n ? "#fff" : T.sub }}>
                  Last {n} weeks
                </button>
              ))}
            </div>

            {/* Comparison */}
            <div style={{ display: "flex", gap: 8 }}>
              <Card style={{ flex: 1, textAlign: "center" }}>
                <Eyebrow>Last week</Eyebrow>
                <div style={{ fontFamily: font.num, fontWeight: 800, fontSize: 24 }}>{Math.round(lastWeekTotal)}h</div>
              </Card>
              <Card style={{ flex: 1, textAlign: "center" }}>
                <Eyebrow>4-wk avg</Eyebrow>
                <div style={{ fontFamily: font.num, fontWeight: 800, fontSize: 24 }}>{Math.round(avg4)}h</div>
                <div style={{ fontSize: 11, fontWeight: 700, color: lwVs4 >= 0 ? T.in : T.out }}>{lwVs4 >= 0 ? "▲" : "▼"} {Math.abs(lwVs4)}%</div>
              </Card>
              <Card style={{ flex: 1, textAlign: "center" }}>
                <Eyebrow>13-wk avg</Eyebrow>
                <div style={{ fontFamily: font.num, fontWeight: 800, fontSize: 24 }}>{Math.round(avg13)}h</div>
                <div style={{ fontSize: 11, fontWeight: 700, color: lwVs13 >= 0 ? T.in : T.out }}>{lwVs13 >= 0 ? "▲" : "▼"} {Math.abs(lwVs13)}%</div>
              </Card>
            </div>

            {/* Weekly bar chart */}
            <Card>
              <Eyebrow>Total hours per week</Eyebrow>
              <div style={{ display: "flex", alignItems: "flex-end", gap: trendWin > 8 ? 3 : 6, height: 150, marginTop: 12 }}>
                {trendWeeks.map((w, i) => {
                  const isCurrent = w.start === thisWeekStart;
                  const h = Math.round((w.total / maxH) * 110);
                  return (
                    <button key={w.start} onClick={() => { setWkStart(w.start); setView("week"); }}
                      style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "flex-end", gap: 2, background: "none", border: "none", cursor: "pointer", height: "100%" }}>
                      {w.total > 0 && (
                        <>
                          <span style={{ fontFamily: font.num, fontWeight: 800, fontSize: trendWin > 8 ? 8 : 10, color: T.ink, lineHeight: 1 }}>{Math.round(w.total)}h</span>
                          <span style={{ fontFamily: font.num, fontWeight: 700, fontSize: trendWin > 8 ? 7 : 9, color: T.out, lineHeight: 1 }}>{fmt(w.cost)}</span>
                        </>
                      )}
                      <div style={{ width: "100%", maxWidth: 30, height: Math.max(2, h), background: isCurrent ? T.hivis : T.in, borderRadius: 4, marginTop: 2 }} />
                      <span style={{ fontSize: 9, color: T.sub, fontFamily: font.num }}>{Number(w.start.slice(8, 10))}/{Number(w.start.slice(5, 7))}</span>
                    </button>
                  );
                })}
              </div>
              <div style={{ fontSize: 11, color: T.sub, marginTop: 8 }}>
                Each bar = one week (Sun–Sat), labeled by start date. Orange = current week (in progress). Tap a bar to open that week's breakdown.
              </div>
            </Card>
          </>
        );
      })()}

      {view === "week" && (<>
      {/* Week selector */}
      <Card style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <Btn small kind="ghost" onClick={() => setWkStart(addDays(wkStart, -7))}>‹</Btn>
        <div style={{ textAlign: "center" }}>
          <div style={{ fontFamily: font.display, fontWeight: 800, fontSize: 16 }}>
            {shortDate(wkStart)} – {shortDate(end)}
          </div>
          <div style={{ fontSize: 12, color: isThisWeek ? T.hivis : T.sub, fontWeight: 600 }}>{isThisWeek ? "THIS WEEK" : "week"}</div>
        </div>
        <Btn small kind="ghost" onClick={() => setWkStart(addDays(wkStart, 7))}>›</Btn>
      </Card>

      <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
        <input style={{ ...inputStyle, flex: 1 }} type="date" value={wkStart} onChange={(e) => e.target.value && setWkStart(weekStartOf(e.target.value))} />
        {!isThisWeek && <Btn small onClick={() => setWkStart(weekStartOf(todayStr()))}>This week</Btn>}
      </div>

      {/* Totals */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
        <Card>
          <Eyebrow>Total hours</Eyebrow>
          <div style={{ fontFamily: font.num, fontWeight: 800, fontSize: 30 }}>{totalH.toLocaleString()}</div>
          <div style={{ fontSize: 12, color: T.sub }}>{inWeek.length} entries · {workedCrew.length} crew</div>
        </Card>
        <Card>
          <Eyebrow>Labor cost</Eyebrow>
          <div style={{ fontFamily: font.num, fontWeight: 800, fontSize: 30 }}>{fmt(totalCost)}</div>
          <div style={{ fontSize: 12, color: totalCost === 0 ? T.hivis : T.sub }}>{totalCost === 0 ? "set rates in Manage" : "at current rates"}</div>
        </Card>
      </div>

      {/* Toggle */}
      <div style={{ display: "flex", gap: 6, background: T.inkSoft, padding: 4, borderRadius: 12 }}>
        {[{ id: "crew", label: "By crew member" }, { id: "job", label: "By job" }].map((v) => (
          <button key={v.id} onClick={() => setMode(v.id)}
            style={{ flex: 1, padding: "9px 0", borderRadius: 9, border: "none", cursor: "pointer", fontFamily: font.display, fontWeight: 700, fontSize: 14,
              background: mode === v.id ? "#fff" : "transparent", color: mode === v.id ? T.ink : T.sub, boxShadow: mode === v.id ? "0 1px 3px rgba(0,0,0,.12)" : "none" }}>
            {v.label}
          </button>
        ))}
      </div>

      <Card>
        {rows.length === 0 ? (
          <div style={{ fontSize: 14, color: T.sub, textAlign: "center", padding: 12 }}>No hours logged this week.</div>
        ) : (
          rows.map((r) => (
            <div key={r.id} onClick={mode === "crew" ? () => setEmpId(r.id) : undefined}
              style={{ padding: "9px 0", borderBottom: `1px solid ${T.line}`, cursor: mode === "crew" ? "pointer" : "default" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 5 }}>
                <span style={{ fontFamily: font.display, fontWeight: 700, fontSize: 15 }}>{r.name}{mode === "crew" ? <span style={{ color: T.sub, fontWeight: 400 }}> ›</span> : null}</span>
                <span style={{ fontFamily: font.num, fontWeight: 800, fontSize: 16, fontVariantNumeric: "tabular-nums" }}>
                  {r.hours}h{mode === "crew" && r.cost > 0 ? <span style={{ color: T.sub, fontWeight: 600, fontSize: 13 }}> · {fmt(r.cost)}</span> : null}
                </span>
              </div>
              <div style={{ height: 8, background: T.inkSoft, borderRadius: 5, overflow: "hidden" }}>
                <div style={{ width: `${(r.hours / maxH) * 100}%`, height: "100%", background: mode === "crew" ? T.in : T.hivis, borderRadius: 5 }} />
              </div>
              {mode === "crew" && <div style={{ fontSize: 11, color: T.sub, marginTop: 3 }}>{r.days} day{r.days !== 1 ? "s" : ""} worked · tap for detail</div>}
            </div>
          ))
        )}
      </Card>

      {mode === "crew" && idleCrew.length > 0 && (
        <Card style={{ borderLeft: `4px solid ${T.hivis}` }}>
          <Eyebrow color={T.hivis}>No hours this week · {idleCrew.length}</Eyebrow>
          <div style={{ fontSize: 13, color: T.ink, marginTop: 6 }}>{idleCrew.map((c) => c.name).join(", ")}</div>
        </Card>
      )}
      </>)}
      </>)}
    </div>
  );
}

// ---------- CALENDAR (month view + one-way push to Google/Apple) ----------
function CalendarView({ data }) {
  const [monthAnchor, setMonthAnchor] = useState(todayStr().slice(0, 7) + "-01");
  const [sel, setSel] = useState(todayStr());
  const schedule = data.schedule || [];
  const tasks = data.tasks || [];

  const shiftMonth = (n) => {
    const d = new Date(monthAnchor + "T00:00:00");
    d.setMonth(d.getMonth() + n);
    setMonthAnchor(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-01`);
  };

  // Items for a given day
  const itemsOn = (ds) => {
    const bookings = schedule.filter((s) => s.date === ds).map((s) => ({
      kind: "booking", crew: data.crew.find((c) => c.id === s.crewId), job: data.jobs.find((j) => j.id === s.jobId),
    })).filter((x) => x.crew && x.job);
    const jobsStart = data.jobs.filter((j) => j.start === ds);
    const jobsEnd = data.jobs.filter((j) => j.end === ds);
    const due = tasks.filter((t) => t.deadline === ds && t.status !== "done");
    return { bookings, jobsStart, jobsEnd, due };
  };

  const first = new Date(monthAnchor + "T00:00:00");
  const y = first.getFullYear(), mo = first.getMonth();
  const startDow = first.getDay();
  const daysInMonth = new Date(y, mo + 1, 0).getDate();
  const cells = [];
  for (let i = 0; i < startDow; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(`${y}-${String(mo + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`);
  const monthLabel = first.toLocaleDateString("en-US", { month: "long", year: "numeric" });

  const it = itemsOn(sel);
  const btnLink = { textDecoration: "none", fontFamily: font.display, fontWeight: 700, fontSize: 12, padding: "5px 9px", borderRadius: 8, border: `1.5px solid ${T.line}`, color: T.ink, background: "#fff", whiteSpace: "nowrap" };

  const AddBtns = ({ title, day, endDay, details, location }) => {
    const endX = addDays(endDay || day, 1);
    const safe = title.replace(/[^\w]+/g, "_").slice(0, 40);
    return (
      <div style={{ display: "flex", gap: 6, marginTop: 5 }}>
        <a href={gcalUrl(title, day, endX, details, location)} target="_blank" rel="noreferrer" style={{ ...btnLink, color: T.hivis, borderColor: T.hivis }}>+ Google</a>
        <a href={icsHref(title, day, endX, details, location)} download={safe + ".ics"} style={btnLink}>+ Apple (.ics)</a>
      </div>
    );
  };

  const dotRow = (ds) => {
    const x = itemsOn(ds);
    const dots = [];
    if (x.bookings.length) dots.push(T.in);
    if (x.jobsStart.length || x.jobsEnd.length) dots.push(T.ink);
    if (x.due.length) dots.push(T.hivis);
    return dots;
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
      <Card style={{ background: T.hivisSoft, border: `1px solid ${T.hivis}` }}>
        <div style={{ fontSize: 13, color: T.ink, lineHeight: 1.45 }}>
          This calendar shows your crew bookings, job dates, and task deadlines. Tap any item to push it into <b>Google</b> or <b>Apple Calendar</b>. This is a one-way add — full live two-way sync needs the connected backend build.
        </div>
      </Card>

      <Card style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <Btn small kind="ghost" onClick={() => shiftMonth(-1)}>‹</Btn>
        <div style={{ fontFamily: font.display, fontWeight: 800, fontSize: 17 }}>{monthLabel}</div>
        <Btn small kind="ghost" onClick={() => shiftMonth(1)}>›</Btn>
      </Card>

      <Card>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 4, marginBottom: 6 }}>
          {["S", "M", "T", "W", "T", "F", "S"].map((d, i) => (
            <div key={i} style={{ textAlign: "center", fontFamily: font.display, fontWeight: 700, fontSize: 11, color: T.sub }}>{d}</div>
          ))}
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 4 }}>
          {cells.map((ds, i) => {
            if (!ds) return <div key={i} />;
            const isToday = ds === todayStr();
            const isSel = ds === sel;
            const dots = dotRow(ds);
            return (
              <button key={i} onClick={() => setSel(ds)}
                style={{ aspectRatio: "1 / 1.15", padding: 2, borderRadius: 9, cursor: "pointer",
                  border: `1.5px solid ${isSel ? T.hivis : isToday ? T.ink : T.line}`, background: isSel ? T.hivisSoft : "#fff",
                  display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 3 }}>
                <div style={{ fontFamily: font.display, fontWeight: 700, fontSize: 13, color: T.ink }}>{Number(ds.slice(8, 10))}</div>
                <div style={{ display: "flex", gap: 2, height: 6 }}>
                  {dots.map((c, k) => <span key={k} style={{ width: 5, height: 5, borderRadius: 999, background: c }} />)}
                </div>
              </button>
            );
          })}
        </div>
        <div style={{ display: "flex", gap: 12, flexWrap: "wrap", marginTop: 10, fontSize: 11, color: T.sub }}>
          <span><span style={{ display: "inline-block", width: 7, height: 7, borderRadius: 999, background: T.in, marginRight: 4 }} />bookings</span>
          <span><span style={{ display: "inline-block", width: 7, height: 7, borderRadius: 999, background: T.ink, marginRight: 4 }} />job dates</span>
          <span><span style={{ display: "inline-block", width: 7, height: 7, borderRadius: 999, background: T.hivis, marginRight: 4 }} />task due</span>

      </Card>

      <Eyebrow>{new Date(sel + "T00:00:00").toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" })}</Eyebrow>

      {it.bookings.length === 0 && it.jobsStart.length === 0 && it.jobsEnd.length === 0 && it.due.length === 0 && (
        <Card><div style={{ fontSize: 14, color: T.sub, textAlign: "center", padding: 12 }}>Nothing scheduled this day.</div></Card>
      )}

      {it.bookings.map((b, i) => (
        <Card key={"b" + i} style={{ borderLeft: `4px solid ${T.in}` }}>
          <div style={{ fontFamily: font.display, fontWeight: 700, fontSize: 16 }}>{b.crew.name} @ {b.job.name}</div>
          {b.job.address && <div style={{ fontSize: 12, color: T.sub }}>{b.job.address}</div>}
          <AddBtns title={`${b.crew.name} @ ${b.job.name}`} day={sel} details={`Crew booking — ${b.job.name}`} location={b.job.address || ""} />
        </Card>
      ))}

      {it.jobsStart.map((j) => (
        <Card key={"s" + j.id} style={{ borderLeft: `4px solid ${T.ink}` }}>
          <div style={{ fontFamily: font.display, fontWeight: 700, fontSize: 16 }}>{j.name} — starts</div>
          {j.address && <div style={{ fontSize: 12, color: T.sub }}>{j.address}</div>}
          <AddBtns title={`${j.name} — start`} day={sel} details={`Job start: ${j.name}`} location={j.address || ""} />
        </Card>
      ))}

      {it.jobsEnd.map((j) => (
        <Card key={"e" + j.id} style={{ borderLeft: `4px solid ${T.ink}` }}>
          <div style={{ fontFamily: font.display, fontWeight: 700, fontSize: 16 }}>{j.name} — target end</div>
          {j.address && <div style={{ fontSize: 12, color: T.sub }}>{j.address}</div>}
          <AddBtns title={`${j.name} — target end`} day={sel} details={`Target completion: ${j.name}`} location={j.address || ""} />
        </Card>

      {it.due.map((t) => {
        const who = data.crew.find((c) => c.id === t.assignedTo);

// ---------- CREW: per-person booking / where they're working ----------
function CrewBookings({ data }) {
  const roster = data.crew.filter(isActiveCrew).sort((a, b) => (a.casual === b.casual ? a.name.localeCompare(b.name) : a.casual ? 1 : -1));
  const [selId, setSelId] = useState(roster[0] ? roster[0].id : null);
  const sel = data.crew.find((c) => c.id === selId) || roster[0];
  const jobName = (id) => { const j = data.jobs.find((x) => x.id === id); return j ? j.name : "—"; };

  if (!sel) return <Card><div style={{ fontSize: 14, color: T.sub, textAlign: "center", padding: 12 }}>No active crew.</div></Card>;

  const entries = (data.timeEntries || []).filter((e) => e.crewId === sel.id).sort((a, b) => b.date.localeCompare(a.date));
  const totalH = entries.reduce((s, e) => s + e.hours, 0);
  const wkStart = weekStartOf(todayStr()), wkEnd = addDays(wkStart, 6);
  const weekH = entries.filter((e) => e.date >= wkStart && e.date <= wkEnd).reduce((s, e) => s + e.hours, 0);

  const byJobMap = {};
  entries.forEach((e) => { byJobMap[e.jobId] = (byJobMap[e.jobId] || 0) + e.hours; });
  const byJob = Object.entries(byJobMap).map(([jid, h]) => ({ jid, h })).sort((a, b) => ((data.jobs.find((j) => j.id === a.jid) || {}).name || "").localeCompare((data.jobs.find((j) => j.id === b.jid) || {}).name || ""));

  const bookings = (data.schedule || []).filter((s) => s.crewId === sel.id).sort((a, b) => a.date.localeCompare(b.date));
  const upcoming = bookings.filter((b) => b.date >= todayStr());

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
      <Eyebrow>Pick a crew member</Eyebrow>
      <div style={{ display: "flex", gap: 8, overflowX: "auto", paddingBottom: 4 }}>
        {roster.map((c) => (
          <button key={c.id} onClick={() => setSelId(c.id)}
            style={{ flex: "0 0 auto", padding: "8px 14px", borderRadius: 999, cursor: "pointer", fontFamily: font.display, fontWeight: 700, fontSize: 14,
              border: `1.5px solid ${selId === c.id ? T.ink : T.line}`, background: selId === c.id ? T.ink : "#fff", color: selId === c.id ? "#fff" : T.ink, whiteSpace: "nowrap" }}>
            {c.name}{c.casual ? " ·c" : ""}
          </button>
        ))}
      </div>

      <Card>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
          <div>
            <div style={{ fontFamily: font.display, fontWeight: 800, fontSize: 22 }}>{sel.name}</div>
            <div style={{ fontSize: 13, color: T.sub, marginTop: 2 }}>
              ${sel.rate}/hr · {sel.casual ? "Casual (as-needed)" : "Permanent"}
            </div>
          </div>
          <div style={{ textAlign: "right" }}>
            <div style={{ fontFamily: font.num, fontWeight: 800, fontSize: 22 }}>{Math.round(totalH * 10) / 10}h</div>
            <div style={{ fontSize: 11, color: T.sub }}>total · {Math.round(weekH * 10) / 10}h this wk</div>
          </div>
        </div>
        <div style={{ marginTop: 10, padding: "8px 12px", background: T.inkSoft, borderRadius: 10, fontSize: 13 }}>
          <span style={{ color: T.sub }}>Current assignment: </span>
          <span style={{ fontWeight: 700, color: T.ink }}>{sel.jobId ? jobName(sel.jobId) : "Unassigned"}</span>
        </div>
      </Card>

      {upcoming.length > 0 && (
        <Card style={{ borderLeft: `4px solid ${T.in}` }}>
          <Eyebrow color={T.in}>Upcoming bookings · {upcoming.length}</Eyebrow>
          {upcoming.map((b, i) => (
            <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "7px 0", borderBottom: i < upcoming.length - 1 ? `1px solid ${T.line}` : "none" }}>
              <span style={{ fontWeight: 700, fontSize: 14 }}>{jobName(b.jobId)}</span>
              <span style={{ fontFamily: font.num, color: T.sub, fontSize: 13 }}>{shortDate(b.date)}</span>
            </div>
          ))}
        </Card>
      )}

      <Card>
        <Eyebrow>Where they've worked (by job)</Eyebrow>
        {byJob.length === 0 ? (
          <div style={{ fontSize: 14, color: T.sub, padding: 8 }}>No hours logged.</div>
        ) : byJob.map(({ jid, h }) => {
          const max = byJob[0].h || 1;
          return (
            <div key={jid} style={{ padding: "8px 0", borderBottom: `1px solid ${T.line}` }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                <span style={{ fontWeight: 700, fontSize: 14 }}>{jobName(jid)}</span>
                <span style={{ fontFamily: font.num, fontWeight: 700, fontSize: 14 }}>{Math.round(h * 10) / 10}h</span>
              </div>
              <div style={{ height: 7, background: T.inkSoft, borderRadius: 4, overflow: "hidden" }}>
                <div style={{ width: `${(h / max) * 100}%`, height: "100%", background: T.hivis, borderRadius: 4 }} />
              </div>
            </div>
          );
        })}
      </Card>

      <Card>
        <Eyebrow>Recent days</Eyebrow>
        {entries.length === 0 ? (
          <div style={{ fontSize: 14, color: T.sub, padding: 8 }}>No recorded days.</div>
        ) : entries.slice(0, 20).map((e, i) => (
          <div key={e.id || i} style={{ display: "flex", justifyContent: "space-between", padding: "7px 0", borderBottom: i < Math.min(entries.length, 20) - 1 ? `1px solid ${T.line}` : "none" }}>
            <span style={{ fontFamily: font.num, color: T.sub, fontSize: 13, minWidth: 70 }}>{shortDate(e.date)}</span>
            <span style={{ fontWeight: 600, fontSize: 14, flex: 1, textAlign: "center" }}>{jobName(e.jobId)}</span>
            <span style={{ fontFamily: font.num, fontWeight: 700, fontSize: 14, minWidth: 44, textAlign: "right" }}>{e.hours}h</span>
          </div>
        ))}
        {entries.length > 20 && <div style={{ fontSize: 12, color: T.sub, marginTop: 8 }}>+ {entries.length - 20} earlier days</div>}
      </Card>
    </div>
  );
}

// ---------- EMPLOYEE DETAIL (opened from Hours) ----------
function EmployeeDetail({ data, crewId, setCrewId, onBack }) {
  const roster = (data.crew || []).filter(isActiveCrew).sort((a, b) => (a.casual === b.casual ? a.name.localeCompare(b.name) : a.casual ? 1 : -1));
  const sel = data.crew.find((c) => c.id === crewId) || roster[0];
  const jobName = (id) => { const j = data.jobs.find((x) => x.id === id); return j ? j.name : "—"; };
  if (!sel) return <Card><div style={{ fontSize: 14, color: T.sub, textAlign: "center", padding: 12 }}>No crew.</div></Card>;

  const rate = sel.rate || 0;
  const all = (data.timeEntries || []).filter((e) => e.crewId === sel.id).sort((a, b) => b.date.localeCompare(a.date));
  const sum = (arr) => arr.reduce((s, e) => s + e.hours, 0);
  const wkStart = weekStartOf(todayStr()), wkEnd = addDays(wkStart, 6);
  const month = todayStr().slice(0, 7);
  const weekH = sum(all.filter((e) => e.date >= wkStart && e.date <= wkEnd));
  const lastWkStart = addDays(wkStart, -7), lastWkEnd = addDays(wkStart, -1);
  const lastWeekH = sum(all.filter((e) => e.date >= lastWkStart && e.date <= lastWkEnd));
  const monthH = sum(all.filter((e) => e.date.slice(0, 7) === month));
  const totalH = sum(all);
  const r1 = (x) => Math.round(x * 10) / 10;

  const byJobMap = {};
  all.forEach((e) => { byJobMap[e.jobId] = (byJobMap[e.jobId] || 0) + e.hours; });
  const byJob = Object.entries(byJobMap).map(([jid, h]) => ({ jid, h })).sort((a, b) => ((data.jobs.find((j) => j.id === a.jid) || {}).name || "").localeCompare((data.jobs.find((j) => j.id === b.jid) || {}).name || ""));

  // Where hours went, week by week
  const weekMap = {};
  all.forEach((e) => {
    const ws = weekStartOf(e.date);
    const w = (weekMap[ws] = weekMap[ws] || { total: 0, jobs: {} });
    w.total += e.hours; w.jobs[e.jobId] = (w.jobs[e.jobId] || 0) + e.hours;
  });
  const weeks = Object.entries(weekMap).map(([ws, v]) => ({
    ws, total: v.total, jobs: Object.entries(v.jobs).map(([jid, h]) => ({ jid, h })).sort((a, b) => ((data.jobs.find((j) => j.id === a.jid) || {}).name || "").localeCompare((data.jobs.find((j) => j.id === b.jid) || {}).name || "")),
  })).sort((a, b) => b.ws.localeCompare(a.ws));

  const bookings = (data.schedule || []).filter((s) => s.crewId === sel.id && s.date >= todayStr()).sort((a, b) => a.date.localeCompare(b.date));

  const SummaryCard = ({ label, hours }) => (
    <Card style={{ flex: 1, textAlign: "center" }}>
      <Eyebrow>{label}</Eyebrow>
      <div style={{ fontFamily: font.num, fontWeight: 800, fontSize: 22 }}>{r1(hours)}h</div>
      <div style={{ fontSize: 12, color: T.out, fontWeight: 700 }}>{fmt(hours * rate)}</div>
    </Card>
  );

  return (
    <>
      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
        <Btn small kind="ghost" onClick={onBack}>‹ Back</Btn>
        <Eyebrow>Employee detail</Eyebrow>
      </div>

      {/* Picker */}
      <div style={{ display: "flex", gap: 8, overflowX: "auto", paddingBottom: 4 }}>
        {roster.map((c) => (
          <button key={c.id} onClick={() => setCrewId(c.id)}
            style={{ flex: "0 0 auto", padding: "7px 13px", borderRadius: 999, cursor: "pointer", fontFamily: font.display, fontWeight: 700, fontSize: 13,
              border: `1.5px solid ${sel.id === c.id ? T.ink : T.line}`, background: sel.id === c.id ? T.ink : "#fff", color: sel.id === c.id ? "#fff" : T.ink, whiteSpace: "nowrap" }}>
            {c.name}{c.casual ? " ·c" : ""}
          </button>
        ))}
      </div>

      <Card>
        <div style={{ fontFamily: font.display, fontWeight: 800, fontSize: 22 }}>{sel.name}</div>
        <div style={{ fontSize: 13, color: T.sub, marginTop: 2 }}>${rate}/hr · {sel.casual ? "Casual (as-needed)" : "Permanent"}{sel.active === false ? " · inactive" : ""}</div>
        <div style={{ marginTop: 10, padding: "8px 12px", background: T.inkSoft, borderRadius: 10, fontSize: 13 }}>
          <span style={{ color: T.sub }}>Current assignment: </span>
          <span style={{ fontWeight: 700, color: T.ink }}>{sel.jobId ? jobName(sel.jobId) : "Unassigned"}</span>
        </div>
      </Card>

      {/* Hours × rate = cost summaries */}
      <div style={{ display: "flex", gap: 8 }}>
        <SummaryCard label="This week" hours={weekH} />
        <SummaryCard label="Last week" hours={lastWeekH} />
        <SummaryCard label="This month" hours={monthH} />
      </div>

      {bookings.length > 0 && (
        <Card style={{ borderLeft: `4px solid ${T.in}` }}>
          <Eyebrow color={T.in}>Upcoming bookings · {bookings.length}</Eyebrow>
          {bookings.map((b, i) => (
            <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "7px 0", borderBottom: i < bookings.length - 1 ? `1px solid ${T.line}` : "none" }}>
              <span style={{ fontWeight: 700, fontSize: 14 }}>{jobName(b.jobId)}</span>
              <span style={{ fontFamily: font.num, color: T.sub, fontSize: 13 }}>{shortDate(b.date)}</span>
            </div>
          ))}
        </Card>
      )}

      <Card>
        <Eyebrow>Day by day — project · hours · cost</Eyebrow>
        {all.length === 0 ? <div style={{ fontSize: 14, color: T.sub, padding: 8 }}>No recorded days.</div> : (
          <>
            <div style={{ display: "flex", justifyContent: "space-between", padding: "4px 0 6px", fontSize: 11, color: T.sub, fontWeight: 700, textTransform: "uppercase", letterSpacing: ".04em", borderBottom: `1px solid ${T.line}` }}>
              <span style={{ minWidth: 64 }}>Day</span>
              <span style={{ flex: 1, textAlign: "center" }}>Project</span>
              <span style={{ minWidth: 92, textAlign: "right" }}>Hours · cost</span>
            </div>
            {all.map((e, i) => (
              <div key={e.id || i} style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", padding: "7px 0", borderBottom: i < all.length - 1 ? `1px solid ${T.line}` : "none" }}>
                <span style={{ fontFamily: font.num, color: T.sub, fontSize: 13, minWidth: 64 }}>{shortDate(e.date)}</span>
                <span style={{ fontWeight: 600, fontSize: 14, flex: 1, textAlign: "center", padding: "0 6px" }}>{jobName(e.jobId)}</span>
                <span style={{ fontFamily: font.num, fontWeight: 700, fontSize: 14, minWidth: 92, textAlign: "right" }}>{e.hours}h · {fmt(e.hours * rate)}</span>
              </div>
            ))}
          </>
        )}
      </Card>
    </>
  );
}

// ---------- ASSISTANT (Claude as in-app analyst / administrator) ----------
function buildContext(data) {
  const crew = (data.crew || []).map((c) => `${c.name} ($${c.rate}/hr, ${c.casual ? "casual" : "permanent"}${c.active === false ? ", inactive" : ""})`).join("; ");
  const jobs = (data.jobs || []).map((j) => {
    const es = (data.timeEntries || []).filter((e) => e.jobId === j.id);
    const h = es.reduce((s, e) => s + e.hours, 0);
    return `${j.name}: ${es.length} entries, ${Math.round(h * 10) / 10}h, revenue ${j.revenue ? "$" + j.revenue : "not set"}`;
  }).join("; ");
  const entries = (data.timeEntries || []).map((e) => {
    const c = data.crew.find((x) => x.id === e.crewId); const j = data.jobs.find((x) => x.id === e.jobId);
    return `${e.date},${c ? c.name : e.crewId},${j ? j.name : e.jobId},${e.hours}h`;
  }).join("\n");
  return `CREW: ${crew}\n\nJOBS (name: entries, hours, revenue): ${jobs}\n\nTIME ENTRIES (date,person,job,hours):\n${entries}`;
}

const ASSISTANT_SYSTEM =
  "You are the analyst and administrator built into FieldLedger, a crew-scheduling and job-costing app for a small construction general contractor. " +
  "Be concise, concrete, and practical — talk like a sharp office manager, not a chatbot. Use the data provided only. " +
  "When asked to scan or check for issues, look for: a person logged as an email or odd name; a project that appears only once or twice (possible typo/duplicate of another site); impossible or suspicious hours (negative, zero, or over ~14 in a day); the same person/day entered twice; crew marked casual who are working full consistent weeks (or permanent crew who aren't); jobs with no revenue set; and anything that would distort labour cost. " +
  "Return a short bulleted list — each item names the specific person/job/date and a one-line recommended fix. " +
  "For questions, answer directly with numbers from the data. If something isn't in the data, say so. Keep replies under ~200 words.";

function Assistant({ data }) {
  const [msgs, setMsgs] = useState([]);
  const [input, setInput] = useState("");
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState(null);

  const ask = async (text) => {
    if (!text.trim() || busy) return;
    setErr(null); setBusy(true);
    setMsgs((m) => [...m, { role: "user", text }]);
    setInput("");
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 1000,
          system: ASSISTANT_SYSTEM,
          messages: [{ role: "user", content: `${buildContext(data)}\n\n---\nREQUEST: ${text}` }],
        }),
      });
      const json = await res.json();
      const out = (json.content || []).filter((b) => b.type === "text").map((b) => b.text).join("\n").trim();
      setMsgs((m) => [...m, { role: "ai", text: out || "(no response)" }]);
    } catch (e) {
      setErr("Couldn't reach the assistant. This works inside the Claude app; a deployed copy needs its own API key via a backend.");
    } finally {
      setBusy(false);
    }
  };

  const chips = ["Scan my data for errors or anything suspicious", "Which job is costing the most labour, and why?", "Who worked the most hours last week?", "Any crew whose casual/permanent setting looks wrong?"];

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
      <Card style={{ borderLeft: `4px solid ${T.hivis}` }}>
        <Eyebrow color={T.hivis}>Assistant · analyst &amp; administrator</Eyebrow>
        <div style={{ fontSize: 13, color: T.sub, marginTop: 4 }}>
          Ask about your crew, jobs, and costs — or have it scan for data problems (misfiled jobs, odd hours, wrong rates). It reads your live ledger.
        </div>
      </Card>

      {msgs.length === 0 && (
        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          {chips.map((c, i) => (
            <button key={i} onClick={() => ask(c)} disabled={busy}
              style={{ textAlign: "left", padding: "11px 13px", borderRadius: 12, border: `1.5px solid ${T.line}`, background: "#fff", cursor: "pointer", fontFamily: font.display, fontWeight: 600, fontSize: 14, color: T.ink }}>
              {c}
            </button>
          ))}
        </div>
      )}

      {msgs.map((m, i) => (
        <div key={i} style={{ display: "flex", justifyContent: m.role === "user" ? "flex-end" : "flex-start" }}>
          <div style={{ maxWidth: "88%", padding: "10px 13px", borderRadius: 14,
            background: m.role === "user" ? T.ink : "#fff", color: m.role === "user" ? "#fff" : T.ink,
            border: m.role === "user" ? "none" : `1px solid ${T.line}`, fontSize: 14, lineHeight: 1.5, whiteSpace: "pre-wrap" }}>
            {m.text}
          </div>
        </div>
      ))}

      {busy && <div style={{ fontSize: 13, color: T.sub, fontStyle: "italic" }}>Thinking…</div>}
      {err && <Card style={{ borderLeft: `4px solid ${T.out}` }}><div style={{ fontSize: 13, color: T.out }}>{err}</div></Card>}

      <div style={{ display: "flex", gap: 8, position: "sticky", bottom: 0, paddingTop: 4 }}>
        <input style={{ ...inputStyle, flex: 1 }} value={input} placeholder="Ask the assistant…"
          onChange={(e) => setInput(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter") ask(input); }} disabled={busy} />
        <Btn onClick={() => ask(input)} disabled={busy}>Send</Btn>
      </div>
      <div style={{ fontSize: 11, color: T.sub }}>Powered by Claude. Reads your data to answer; nothing is changed without you.</div>
    </div>
  );
}
